<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnostic Profile</title>
  <style>
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
    button { margin-top: 20px; padding: 10px 20px; }
    input, textarea { width: 95%; padding: 6px; }
  </style>
</head>
<body>
  <h2>Diagnostic Center Profile</h2>
  <div id="profileContainer">
    <form id="profileForm">
      <table id="profileTable"></table>
      <button type="button" id="editBtn">Edit</button>
      <button type="submit" id="updateBtn" style="display:none;">Update</button>
    </form>
  </div>

  <script>
    const API_BASE = "https://hitaishihealthcare.com/api";
    let userData = {};

    document.addEventListener("DOMContentLoaded", () => {
      const profileTable = document.getElementById("profileTable");
      const profileForm = document.getElementById("profileForm");
      const editBtn = document.getElementById("editBtn");
      const updateBtn = document.getElementById("updateBtn");

      const email = localStorage.getItem("diagnosticEmail");
      const password = localStorage.getItem("diagnosticPassword");

      if (!email || !password) {
        document.getElementById("profileContainer").innerHTML = "<p>Please login first.</p>";
        return;
      }

      fetch(`${API_BASE}/diagnostics/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success && data.user) {
          userData = data.user;
          renderProfile(userData);
        } else {
          profileTable.innerHTML = `<tr><td colspan='2'>${data.error || "Unable to load profile."}</td></tr>`;
        }
      });

      function renderProfile(data, editable = false) {
        const operational = JSON.parse(data.operational_hours || '{}');
        const services = JSON.parse(data.services || '[]');
        profileTable.innerHTML = '';

        const fields = {
          center_id: "Center ID",
          center_name: "Center Name",
          owner_name: "Owner Name",
          center_type: "Center Type",
          email: "Email",
          phone: "Phone",
          alt_phone: "Alternate Phone",
          whatsapp: "WhatsApp",
          address: "Address",
          city: "City",
          state: "State",
          pincode: "Pincode",
          map_url: "Map URL",
          registration_number: "Registration Number",
          gst_number: "GST Number",
          home_sample: "Home Sample",
          operational_from: "Operational From",
          operational_to: "Operational To",
          services: "Services",
          bank_name: "Bank Name",
          account_holder_name: "Account Holder",
          account_number: "Account Number",
          ifsc_code: "IFSC Code",
          upi_id: "UPI ID"
        };

        for (let key in fields) {
          let value = "";
          if (key === 'operational_from') value = operational.from || '';
          else if (key === 'operational_to') value = operational.to || '';
          else if (key === 'services') value = services.join(', ');
          else value = data[key] || '';

          profileTable.innerHTML += `
            <tr>
              <th>${fields[key]}</th>
              <td>
                ${editable ? `<input type="text" name="${key}" value="${value}">` : value}
              </td>
            </tr>
          `;
        }
      }

      editBtn.addEventListener('click', () => {
        renderProfile(userData, true);
        editBtn.style.display = 'none';
        updateBtn.style.display = 'inline-block';
      });

      profileForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const formData = new FormData(profileForm);
        const updatedData = Object.fromEntries(formData.entries());

        // Update operational_hours and services format to match DB
        const payload = {
          ...userData,
          ...updatedData,
          operational_hours: JSON.stringify({ from: updatedData.operational_from, to: updatedData.operational_to }),
          services: JSON.stringify(updatedData.services.split(',').map(s => s.trim()))
        };

        delete payload.operational_from;
        delete payload.operational_to;

        fetch(`${API_BASE}/diagnostics/update`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        })
        .then(res => res.json())
        .then(result => {
          if (result.success) {
            alert("Profile updated successfully.");
            userData = payload;
            renderProfile(userData);
            editBtn.style.display = 'inline-block';
            updateBtn.style.display = 'none';
          } else {
            alert("Update failed: " + result.error);
          }
        });
      });
    });
  </script>
</body>
</html>
