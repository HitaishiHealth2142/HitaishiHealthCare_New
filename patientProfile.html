<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Profile | Hitaishi Healthcare</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <style>
        :root {
            --primary-color: #007bff;
            --secondary-color: #6c757d;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --light-color: #f8f9fa;
            --dark-color: #343a40;
            --border-radius: 8px;
            --box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f7fa;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .profile-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .profile-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--primary-color);
        }

        .logout-btn {
            background-color: var(--danger-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
        }

        .logout-btn:hover {
            background-color: #c82333;
        }

        .profile-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
        }

        .profile-sidebar {
            background-color: white;
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: var(--box-shadow);
            height: fit-content;
        }

        .profile-pic {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 20px;
            display: block;
            border: 3px solid var(--primary-color);
        }

        .profile-name {
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .profile-email {
            text-align: center;
            color: var(--secondary-color);
            margin-bottom: 20px;
        }

        .profile-nav {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .profile-nav li {
            margin-bottom: 10px;
        }

        .profile-nav a {
            display: block;
            padding: 10px 15px;
            border-radius: var(--border-radius);
            color: #333;
            text-decoration: none;
            transition: var(--transition);
            font-weight: 500;
        }

        .profile-nav a:hover, .profile-nav a.active {
            background-color: var(--primary-color);
            color: white;
        }

        .profile-nav a i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
        }

        .profile-content {
            background-color: white;
            border-radius: var(--border-radius);
            padding: 25px;
            box-shadow: var(--box-shadow);
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .section-title button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
        }

        .section-title button:hover {
            background-color: #0069d9;
        }

        .appointment-card {
            border: 1px solid #e0e0e0;
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 15px;
            transition: var(--transition);
        }

        .appointment-card:hover {
            box-shadow: var(--box-shadow);
        }

        .appointment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            align-items: center;
        }

        .appointment-title {
            font-weight: 600;
            font-size: 18px;
            color: var(--primary-color);
        }

        .appointment-status {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-scheduled {
            background-color: #fff3cd;
            color: #856404;
        }

        .status-completed {
            background-color: #d4edda;
            color: #155724;
        }

        .status-cancelled {
            background-color: #f8d7da;
            color: #721c24;
        }

        .appointment-details {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .detail-item {
            margin-bottom: 8px;
        }

        .detail-label {
            font-weight: 500;
            color: var(--secondary-color);
            font-size: 14px;
        }

        .detail-value {
            font-weight: 500;
        }

        .no-appointments {
            text-align: center;
            padding: 30px;
            color: var(--secondary-color);
        }

        /* Profile Form Styles */
        .profile-form {
            max-width: 600px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            font-size: 16px;
            transition: var(--transition);
        }

        .form-control:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.25);
        }

        .form-row {
            display: flex;
            gap: 20px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: var(--transition);
        }

        .btn-primary:hover {
            background-color: #0069d9;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            overflow: auto;
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 25px;
            border-radius: var(--border-radius);
            width: 80%;
            max-width: 600px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 24px;
            color: #aaa;
            cursor: pointer;
        }

        .close-modal:hover {
            color: #333;
        }

        /* Responsive Styles */
        @media (max-width: 768px) {
            .profile-container {
                grid-template-columns: 1fr;
            }

            .profile-sidebar {
                margin-bottom: 20px;
            }

            .form-row {
                flex-direction: column;
                gap: 0;
            }
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top-color: var(--primary-color);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Navbar (same as your other pages) -->
    <nav style="width: 100%;">
        <!-- Include your navbar code here from previous pages -->
    </nav>

    <div class="container">
        <div class="profile-header">
            <h1 class="profile-title">My Profile</h1>
            <button class="logout-btn" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>

        <div class="profile-container">
            <div class="profile-sidebar">
                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Profile Picture" class="profile-pic" id="profilePic">
                <h2 class="profile-name" id="profileName">Loading...</h2>
                <p class="profile-email" id="profileEmail">user@example.com</p>
                
                <ul class="profile-nav">
                    <li><a href="#" class="active" id="navAppointments"><i class="fas fa-calendar-check"></i> Appointments</a></li>
                    <li><a href="#" id="navProfile"><i class="fas fa-user-edit"></i> Edit Profile</a></li>
                    <li><a href="#" id="navMedicalRecords"><i class="fas fa-file-medical"></i> Medical Records</a></li>
                    <li><a href="#" id="navPrescriptions"><i class="fas fa-prescription-bottle-alt"></i> Prescriptions</a></li>
                    <li><a href="#" id="navBilling"><i class="fas fa-file-invoice-dollar"></i> Billing</a></li>
                </ul>
            </div>

            <div class="profile-content">
                <!-- Appointments Section -->
                <div id="appointmentsSection">
                    <div class="section-title">
                        <span><i class="fas fa-calendar-alt"></i> My Appointments</span>
                        <button id="newAppointmentBtn"><i class="fas fa-plus"></i> New Appointment</button>
                    </div>
                    
                    <div id="appointmentsList">
                        <!-- Appointments will be loaded here -->
                        <div class="no-appointments">
                            <i class="fas fa-spinner spinner"></i> Loading appointments...
                        </div>
                    </div>
                </div>

                <!-- Edit Profile Section (hidden by default) -->
                <div id="editProfileSection" style="display: none;">
                    <div class="section-title">
                        <span><i class="fas fa-user-edit"></i> Edit Profile</span>
                    </div>
                    
                    <form id="profileForm" class="profile-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="editFirstName">First Name</label>
                                <input type="text" id="editFirstName" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label for="editLastName">Last Name</label>
                                <input type="text" id="editLastName" class="form-control" required>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="editEmail">Email</label>
                                <input type="email" id="editEmail" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label for="editMobile">Mobile</label>
                                <input type="tel" id="editMobile" class="form-control" required>
                            </div>
                        </div>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="editBloodGroup">Blood Group</label>
                                <select id="editBloodGroup" class="form-control" required>
                                    <option value="">Select Blood Group</option>
                                    <option value="A+">A+</option>
                                    <option value="A-">A-</option>
                                    <option value="B+">B+</option>
                                    <option value="B-">B-</option>
                                    <option value="O+">O+</option>
                                    <option value="O-">O-</option>
                                    <option value="AB+">AB+</option>
                                    <option value="AB-">AB-</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="editGender">Gender</label>
                                <select id="editGender" class="form-control" required>
                                    <option value="">Select Gender</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="editDob">Date of Birth</label>
                            <input type="date" id="editDob" class="form-control" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="editDisease">Medical Condition (if any)</label>
                            <input type="text" id="editDisease" class="form-control">
                        </div>
                        
                        <div class="form-group">
                            <label for="editAddress">Address</label>
                            <textarea id="editAddress" class="form-control" rows="3" required></textarea>
                        </div>
                        
                        <button type="submit" class="btn-primary" id="saveProfileBtn">
                            <i class="fas fa-save"></i> Save Changes
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- New Appointment Modal -->
    <div id="appointmentModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 style="margin-bottom: 20px;"><i class="fas fa-calendar-plus"></i> New Appointment</h2>
            
            <form id="appointmentForm">
                <div class="form-group">
                    <label for="appointmentType">Appointment Type</label>
                    <select id="appointmentType" class="form-control" required>
                        <option value="">Select Type</option>
                        <option value="doctor">Doctor Consultation</option>
                        <option value="clinic">Clinic Visit</option>
                        <option value="diagnostic">Diagnostic Test</option>
                        <option value="hospital">Hospital Visit</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="appointmentProvider">Select Provider</label>
                    <select id="appointmentProvider" class="form-control" required>
                        <option value="">Select Provider</option>
                        <!-- Will be populated dynamically -->
                    </select>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="appointmentDate">Date</label>
                        <input type="date" id="appointmentDate" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="appointmentTime">Time</label>
                        <input type="time" id="appointmentTime" class="form-control" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="appointmentReason">Reason</label>
                    <textarea id="appointmentReason" class="form-control" rows="3" required></textarea>
                </div>
                
                <button type="submit" class="btn-primary">
                    <i class="fas fa-calendar-check"></i> Book Appointment
                </button>
            </form>
        </div>
    </div>

    <script>
        // Check if user is logged in
        document.addEventListener('DOMContentLoaded', function() {
            const userId = localStorage.getItem('userId');
            const firstName = localStorage.getItem('firstName');
            const fullName = localStorage.getItem('fullName');
            
            if (!userId) {
                window.location.href = 'patientLogin.html';
                return;
            }
            
            // Load profile data
            loadProfileData(userId);
            loadAppointments(userId);
            
            // Navigation handlers
            document.getElementById('navAppointments').addEventListener('click', function(e) {
                e.preventDefault();
                showSection('appointmentsSection');
                setActiveNav(this);
            });
            
            document.getElementById('navProfile').addEventListener('click', function(e) {
                e.preventDefault();
                showSection('editProfileSection');
                setActiveNav(this);
            });
            
            // Logout handler
            document.getElementById('logoutBtn').addEventListener('click', function() {
                localStorage.removeItem('userId');
                localStorage.removeItem('firstName');
                localStorage.removeItem('fullName');
                window.location.href = 'patientLogin.html';
            });
            
            // New appointment button
            document.getElementById('newAppointmentBtn').addEventListener('click', function() {
                document.getElementById('appointmentModal').style.display = 'block';
            });
            
            // Close modal
            document.querySelector('.close-modal').addEventListener('click', function() {
                document.getElementById('appointmentModal').style.display = 'none';
            });
            
            // Close modal when clicking outside
            window.addEventListener('click', function(event) {
                if (event.target === document.getElementById('appointmentModal')) {
                    document.getElementById('appointmentModal').style.display = 'none';
                }
            });
            
            // Profile form submission
            document.getElementById('profileForm').addEventListener('submit', function(e) {
                e.preventDefault();
                updateProfile(userId);
            });
            
            // Set initial active nav
            setActiveNav(document.getElementById('navAppointments'));
        });
        
        function setActiveNav(activeElement) {
            document.querySelectorAll('.profile-nav a').forEach(nav => {
                nav.classList.remove('active');
            });
            activeElement.classList.add('active');
        }
        
        function showSection(sectionId) {
            document.getElementById('appointmentsSection').style.display = 'none';
            document.getElementById('editProfileSection').style.display = 'none';
            document.getElementById(sectionId).style.display = 'block';
        }
        
        function loadProfileData(userId) {
            fetch(`https://hitaishihealthcare.com/api/patient/profile?patientId=${userId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.patient) {
                        const patient = data.patient;
                        
                        // Update profile sidebar
                        document.getElementById('profileName').textContent = `${patient.first_name} ${patient.last_name}`;
                        document.getElementById('profileEmail').textContent = patient.email;
                        
                        // Update profile form
                        document.getElementById('editFirstName').value = patient.first_name;
                        document.getElementById('editLastName').value = patient.last_name;
                        document.getElementById('editEmail').value = patient.email;
                        document.getElementById('editMobile').value = patient.mobile;
                        document.getElementById('editBloodGroup').value = patient.blood_group;
                        document.getElementById('editGender').value = patient.gender;
                        document.getElementById('editDob').value = patient.dob;
                        document.getElementById('editDisease').value = patient.disease;
                        document.getElementById('editAddress').value = patient.address;
                    }
                })
                .catch(error => {
                    console.error('Error loading profile:', error);
                    alert('Failed to load profile data. Please try again.');
                });
        }
        
        function loadAppointments(userId) {
            fetch(`https://hitaishihealthcare.com/api/patient/appointments?patientId=${userId}`)
                .then(response => response.json())
                .then(data => {
                    const appointmentsList = document.getElementById('appointmentsList');
                    
                    if (data.appointments && data.appointments.length > 0) {
                        appointmentsList.innerHTML = '';
                        
                        data.appointments.forEach(appointment => {
                            const statusClass = getStatusClass(appointment.status);
                            const formattedDate = new Date(appointment.appointment_date).toLocaleDateString();
                            const formattedTime = formatTime(appointment.appointment_time);
                            
                            const appointmentCard = document.createElement('div');
                            appointmentCard.className = 'appointment-card';
                            appointmentCard.innerHTML = `
                                <div class="appointment-header">
                                    <div class="appointment-title">${appointment.type} Appointment</div>
                                    <div class="appointment-status ${statusClass}">${appointment.status}</div>
                                </div>
                                <div class="appointment-details">
                                    <div class="detail-item">
                                        <div class="detail-label">Provider</div>
                                        <div class="detail-value">${appointment.provider_name || 'Not specified'}</div>
                                    </div>
                                    <div class="detail-item">
                                        <div class="detail-label">Date & Time</div>
                                        <div class="detail-value">${formattedDate} at ${formattedTime}</div>
                                    </div>
                                    <div class="detail-item">
                                        <div class="detail-label">Location</div>
                                        <div class="detail-value">${appointment.location || 'Not specified'}</div>
                                    </div>
                                    <div class="detail-item">
                                        <div class="detail-label">Reason</div>
                                        <div class="detail-value">${appointment.reason || 'Not specified'}</div>
                                    </div>
                                </div>
                            `;
                            
                            appointmentsList.appendChild(appointmentCard);
                        });
                    } else {
                        appointmentsList.innerHTML = `
                            <div class="no-appointments">
                                <i class="far fa-calendar-times" style="font-size: 48px; margin-bottom: 15px;"></i>
                                <p>You don't have any appointments yet.</p>
                                <button class="btn-primary" id="newAppointmentBtn2" style="margin-top: 15px;">
                                    <i class="fas fa-plus"></i> Book Your First Appointment
                                </button>
                            </div>
                        `;
                        
                        document.getElementById('newAppointmentBtn2').addEventListener('click', function() {
                            document.getElementById('appointmentModal').style.display = 'block';
                        });
                    }
                })
                .catch(error => {
                    console.error('Error loading appointments:', error);
                    document.getElementById('appointmentsList').innerHTML = `
                        <div class="no-appointments">
                            <i class="fas fa-exclamation-triangle" style="color: #dc3545;"></i>
                            <p>Failed to load appointments. Please try again later.</p>
                        </div>
                    `;
                });
        }
        
        function getStatusClass(status) {
            switch (status.toLowerCase()) {
                case 'scheduled':
                    return 'status-scheduled';
                case 'completed':
                    return 'status-completed';
                case 'cancelled':
                    return 'status-cancelled';
                default:
                    return '';
            }
        }
        
        function formatTime(timeString) {
            if (!timeString) return '';
            
            const timeParts = timeString.split(':');
            let hours = parseInt(timeParts[0]);
            const minutes = timeParts[1];
            
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; // the hour '0' should be '12'
            
            return `${hours}:${minutes} ${ampm}`;
        }
        
        function updateProfile(userId) {
            const saveBtn = document.getElementById('saveProfileBtn');
            const originalText = saveBtn.innerHTML;
            saveBtn.innerHTML = '<i class="fas fa-spinner spinner"></i> Saving...';
            saveBtn.disabled = true;
            
            const profileData = {
                first_name: document.getElementById('editFirstName').value,
                last_name: document.getElementById('editLastName').value,
                email: document.getElementById('editEmail').value,
                mobile: document.getElementById('editMobile').value,
                blood_group: document.getElementById('editBloodGroup').value,
                gender: document.getElementById('editGender').value,
                dob: document.getElementById('editDob').value,
                disease: document.getElementById('editDisease').value,
                address: document.getElementById('editAddress').value
            };
            
            fetch(`https://hitaishihealthcare.com/api/patient/profile?patientId=${userId}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(profileData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.message) {
                    alert('Profile updated successfully!');
                    // Update the displayed name
                    document.getElementById('profileName').textContent = 
                        `${profileData.first_name} ${profileData.last_name}`;
                    document.getElementById('profileEmail').textContent = profileData.email;
                } else {
                    throw new Error(data.error || 'Failed to update profile');
                }
            })
            .catch(error => {
                console.error('Error updating profile:', error);
                alert(error.message || 'Failed to update profile. Please try again.');
            })
            .finally(() => {
                saveBtn.innerHTML = originalText;
                saveBtn.disabled = false;
            });
        }
    </script>

    <!-- Footer (same as your other pages) -->
    <footer style="background-color: black; color: white; padding: 30px 10%; font-family: Arial, sans-serif;">
        <!-- Include your footer code here from previous pages -->
    </footer>

    <!-- Chatbot placeholder -->
    <div id="chatbot-placeholder"></div>

    <!-- JS to load the chatbot -->
    <script>
        fetch('chatbot.html')
            .then(res => res.text())
            .then(html => {
                const container = document.getElementById('chatbot-placeholder');
                container.innerHTML = html;

                // Re-run script tags
                const scripts = container.querySelectorAll("script");
                scripts.forEach(script => {
                    const newScript = document.createElement("script");
                    if (script.src) {
                        newScript.src = script.src;
                    } else {
                        newScript.textContent = script.textContent;
                    }
                    document.body.appendChild(newScript);
                });
            });
    </script>
</body>
</html>
