<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctors - Hitaishi HealthCare</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            color: #333;
        }

        #doctors-section {
            padding: 40px 20px;
            background-color: #f8f9fa;
        }

        #doctors-section h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #2c3e50;
            font-size: 38px;
            font-weight: bolder;
        }
        
        #doctors-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .doctor-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            padding: 20px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .doctor-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
        }

        .doctor-avatar {
            width: 100px;
            height: 100px;
            margin: 0 auto 15px;
            border-radius: 50%;
            background-color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #7f8c8d;
            font-weight: bold;
        }

        .doctor-card h3 {
            margin: 10px 0 5px;
            color: #2c3e50;
        }

        .doctor-card p {
            margin: 5px 0;
            color: #7f8c8d;
        }

        .doctor-specialization {
            color: #3498db;
            font-weight: 600;
        }
        
        .video-call-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
            align-self: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 500;
        }

        .video-call-btn:hover {
            background-color: #219d53;
        }

        #loading-message, #error-message, #login-prompt {
            text-align: center;
            padding: 20px;
        }

        #loading-message {
            color: #666;
            font-size: 18px;
        }
        
        #error-message {
            color: #e74c3c;
            display: none;
        }
        
        #login-prompt {
            background-color: #fff3cd;
            border: 1px solid #ffeeba;
            border-radius: 8px;
            max-width: 600px;
            margin: 20px auto;
            color: #856404;
            display: none;
        }

        /* New message box for call initiation */
        .call-message-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 30px;
            background-color: #f0f9ff;
            border: 2px solid #3498db;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            z-index: 1000;
            text-align: center;
            font-size: 1.1em;
            color: #2c3e50;
            display: none; /* Initially hidden */
        }
        .call-message-box .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #3498db;
            animation: spin 1s ease infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

    </style>
</head>
<body>

<section id="doctors-section">
    <h2>Our Qualified Doctors</h2>
    
    <div id="doctors-container">
        
    </div>

    <div id="loading-message">
        Loading doctors...
    </div>

    <div id="error-message">

    </div>

    <div id="login-prompt">
        You must be logged in as a patient to make a call. Please <a href="login.html" style="color: #007bff; text-decoration: underline;">log in</a>.
    </div>
    
    <!-- New message box -->
    <div id="callMessageBox" class="call-message-box">
        <div class="spinner"></div>
        <p>Calling the doctor. Please wait...</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        // --- Socket.IO setup for patient-side notifications ---
        const socket = io("https://hitaishihealthcare.com", { transports: ["websocket", "polling"] });

        function fetchDoctors() {
            document.getElementById('loading-message').style.display = 'block';
            fetch('/api/getdoctors') 
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Network response was not ok: ${response.statusText}`);
                    }
                    return response.json();
                })
                .then(doctors => {
                    document.getElementById('loading-message').style.display = 'none';
                    
                    if (!doctors || doctors.length === 0) {
                        const errorDiv = document.getElementById('error-message');
                        errorDiv.textContent = 'No doctors are available at the moment.';
                        errorDiv.style.display = 'block';
                        return;
                    }
                    
                    renderDoctors(doctors);
                })
                .catch(error => {
                    console.error('Error fetching doctors:', error);
                    const errorDiv = document.getElementById('error-message');
                    errorDiv.textContent = 'Failed to load doctors. Please try again later.';
                    errorDiv.style.display = 'block';
                    document.getElementById('loading-message').style.display = 'none';
                });
        }
        
        function renderDoctors(doctors) {
            const container = document.getElementById('doctors-container');
            container.innerHTML = '';
            
            doctors.forEach(doctor => {
                const card = document.createElement('div');
                card.className = 'doctor-card';
                
                card.innerHTML = `
                <div>
                    <div class="doctor-avatar">
                        ${doctor.first_name ? doctor.first_name.charAt(0) : 'D'}${doctor.last_name ? doctor.last_name.charAt(0) : ''}
                    </div>
                    <h3>Dr. ${doctor.first_name || ''} ${doctor.last_name || ''}</h3>
                    <p class="doctor-specialization">${doctor.specialization || 'General Practitioner'}</p>
                    <p>${doctor.experience || '0'} years of experience</p>
                    <p style="font-size: 14px;">${doctor.clinic || 'Medical Center'}</p>
                </div>
                <button class="video-call-btn" data-doctor-uid="${doctor.uid}">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;"><path d="M15.6 11.6L22 7v10l-6.4-4.6v-1.8zM4 5h9a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z"></path></svg>
                    Call
                </button>
                `;
                
                const videoBtn = card.querySelector('.video-call-btn');
                videoBtn.addEventListener('click', () => {
                    document.getElementById('login-prompt').style.display = 'none';
                    document.getElementById('error-message').style.display = 'none';

                    const patientUserString = localStorage.getItem('patientUser') || sessionStorage.getItem('patientUser');
                    if (!patientUserString) {
                        console.warn("Patient login data not found in localStorage or sessionStorage.");
                        document.getElementById('login-prompt').style.display = 'block';
                        return;
                    }
                    
                    try {
                        let patientData;
                        const correctedJsonString = patientUserString.replace(/'/g, '"');
                        patientData = JSON.parse(correctedJsonString);

                        if (typeof patientData === 'string') {
                            patientData = JSON.parse(patientData);
                        }

                        const patientId = patientData.uniqueId;
                        const patientName = patientData.fullName;
                        const doctorUid = videoBtn.dataset.doctorUid;

                        if (!patientId || !doctorUid) { 
                            throw new Error("Missing Patient ID or Doctor ID.");
                        }

                        const roomId = `${doctorUid}${patientId}`;
                        
                        // Show the call message box
                        document.getElementById('callMessageBox').style.display = 'block';

                        // Emit the call event to the server
                        socket.emit('join-call-room', {
                            roomId,
                            doctorUid,
                            patientId,
                            patientName
                        });

                        // Redirect after a short delay to give the server time to process
                        setTimeout(() => {
                            console.log(`Redirecting to private room: ${roomId}`);
                            window.location.href = `meet.html?roomId=${roomId}`;
                        }, 2000); // 2-second delay

                    } catch (error) {
                        console.error("Error parsing user data or creating room link:", error);
                        document.getElementById('callMessageBox').style.display = 'none';
                        const errorDiv = document.getElementById('error-message');
                        errorDiv.textContent = 'Your session data seems corrupted. Please log out and log in again.';
                        errorDiv.style.display = 'block';
                    }
                });
                
                container.appendChild(card);
            });
        }
        
        document.addEventListener('DOMContentLoaded', fetchDoctors);
    </script>
</section>
</body>
</html>
