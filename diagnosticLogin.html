<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Diagnostic Center Login | Hitaishi Healthcare</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .login-container { max-width: 400px; margin: 80px auto; padding: 30px; background: #fff; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
    .btn-primary { width: 100%; }
    .link { display: block; margin-top: 10px; text-align: center; }
  </style>
</head>
<body>

<div class="container">
  <div class="login-container">
    <h3 class="text-center mb-3">Diagnostic Center Login</h3>
    <form id="loginForm">
      <div class="mb-3">
        <label>Email</label>
        <input type="email" id="loginEmail" class="form-control" required>
      </div>
      <div class="mb-3">
        <label>Password</label>
        <input type="password" id="loginPassword" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary">Login</button>
    </form>

    <a href="#" class="link" data-bs-toggle="modal" data-bs-target="#forgotModal">Forgot Password?</a>
    <p class="text-center mt-2"> Don't have an account?  <a href="diagnosticRegistration.html">Create one</a> </p>

  </div>
</div>

<!-- ✅ Forgot Password Modal -->
<div class="modal fade" id="forgotModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content p-3">
      <h5 class="modal-title">Forgot Password</h5>
      <div class="modal-body">
        <div id="forgotStep1">
          <label>Enter your registered email:</label>
          <input type="email" id="forgotEmail" class="form-control mb-2">
          <button class="btn btn-warning w-100" onclick="sendOtp()">Send OTP</button>
        </div>

        <div id="forgotStep2" style="display:none;">
          <label>Enter OTP sent to your email:</label>
          <input type="text" id="forgotOtp" class="form-control mb-2">
          <button class="btn btn-info w-100" onclick="verifyOtp()">Verify OTP</button>
        </div>

        <div id="forgotStep3" style="display:none;">
          <label>Enter New Password:</label>
          <input type="password" id="newPassword" class="form-control mb-2">
          <button class="btn btn-success w-100" onclick="resetPassword()">Reset Password</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const API_BASE = "https://hitaishihealthcare.com/api"; // adjust if needed

// ✅ Login functionality
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = loginEmail.value;
  const password = loginPassword.value;

  const res = await fetch(`${API_BASE}/diagnostics/login`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();
  if (data.success) {
    alert("Login Successful!");
    window.location.href = "diagnosticProfile.html"; // redirect to dashboard
  } else {
    alert(data.error || "Login failed");
  }
});

// ✅ Forgot Password Workflow
let userEmail = "";

async function sendOtp() {
  userEmail = forgotEmail.value;
  if (!userEmail) return alert("Enter email");

  const res = await fetch(`${API_BASE}/diagnostics/forgot-password/send-otp`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email: userEmail })
  });
  const data = await res.json();

  if (data.success) {
    alert("OTP sent to your email.");
    document.getElementById("forgotStep1").style.display = "none";
    document.getElementById("forgotStep2").style.display = "block";
  } else alert(data.error);
}

async function verifyOtp() {
  const otp = forgotOtp.value;
  if (!otp) return alert("Enter OTP");

  const res = await fetch(`${API_BASE}/diagnostics/forgot-password/verify-otp`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email: userEmail, otp })
  });
  const data = await res.json();

  if (data.success) {
    alert("OTP Verified! Set new password.");
    document.getElementById("forgotStep2").style.display = "none";
    document.getElementById("forgotStep3").style.display = "block";
  } else alert(data.error);
}

async function resetPassword() {
  const newPass = newPassword.value;
  if (!newPass) return alert("Enter new password");

  const res = await fetch(`${API_BASE}/diagnostics/forgot-password/reset`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email: userEmail, newPassword: newPass })
  });
  const data = await res.json();

  if (data.success) {
    alert("Password reset successful! Please login.");
    location.reload();
  } else alert(data.error);
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
