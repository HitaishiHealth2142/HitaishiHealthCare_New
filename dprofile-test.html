<!-- dprofile-test.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Doctor Profile</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }
    h2 {
      color: #0A0A57;
    }
    .profile-info p {
      margin: 6px 0;
      padding: 4px 0;
      border-bottom: 1px solid #ddd;
    }
    button {
      margin-top: 20px;
      padding: 8px 16px;
      background-color: #0A0A57;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h2>Doctor Profile</h2>
  <div class="profile-info" id="profile"></div>
  <button onclick="logout()">Logout</button>

  <script>
    let doctor = null;

    try {
      const docData = localStorage.getItem("doctor");
      if (docData && docData !== "undefined") {
        doctor = JSON.parse(docData);
      }
    } catch (e) {
      console.error("Error parsing doctor from localStorage:", e);
    }

    if (!doctor) {
      alert("No doctor is logged in!");
      window.location.href = "doctor-login.html";
    } else {
      const profileDiv = document.getElementById("profile");
      profileDiv.innerHTML = `
        <p><strong>UID:</strong> ${doctor.uid}</p>
        <p><strong>Name:</strong> ${doctor.name}</p>
        <p><strong>Email:</strong> ${doctor.email}</p>
        <p><strong>Mobile:</strong> ${doctor.mobile || 'N/A'}</p>
        <p><strong>Address:</strong> ${doctor.address || 'N/A'}</p>
        <p><strong>Clinic:</strong> ${doctor.clinic || 'N/A'}</p>
        <p><strong>License Number:</strong> ${doctor.license_number || 'N/A'}</p>
        <p><strong>Aadhar Card:</strong> ${doctor.aadhar_card || 'N/A'}</p>
        <p><strong>Experience:</strong> ${doctor.experience || 'N/A'}</p>
        <p><strong>Degree:</strong> ${doctor.degree || 'N/A'}</p>
        <p><strong>University:</strong> ${doctor.university || 'N/A'}</p>
        <p><strong>Specialization:</strong> ${doctor.specialization || 'N/A'}</p>
        <p><strong>Availability:</strong> ${doctor.availability || 'N/A'}</p>
        <p><strong>From Time:</strong> ${doctor.from_time || 'N/A'}</p>
        <p><strong>To Time:</strong> ${doctor.to_time || 'N/A'}</p>
        <p><strong>Additional Info:</strong> ${doctor.additional_info || 'N/A'}</p>
      `;
    }

    function logout() {
      fetch("/api/doctorlogout", { method: "POST" });
      localStorage.removeItem("doctor");
      window.location.href = "doctor-login.html";
    }
  </script>
</body>
</html>
