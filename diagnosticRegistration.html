<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Diagnostic Center Registration</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --primary: #4361ee;
      --secondary: #3f37c9;
      --success: #4cc9f0;
      --danger: #f72585;
      --light: #f8f9fa;
      --dark: #212529;
      --gray: #6c757d;
      --light-gray: #e9ecef;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f5f7fa;
      color: var(--dark);
      line-height: 1.6;
    }
    
    .container {
      max-width: 1000px;
      margin: 30px auto;
      padding: 20px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      animation: fadeIn 0.5s ease-in-out;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    h2 {
      text-align: center;
      margin-bottom: 30px;
      color: var(--primary);
      position: relative;
      padding-bottom: 10px;
    }
    
    h2::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 3px;
      background: linear-gradient(to right, var(--primary), var(--success));
      border-radius: 3px;
    }
    
    .form-header {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .progress-bar {
      display: flex;
      justify-content: space-between;
      position: relative;
      margin-bottom: 30px;
      counter-reset: step;
    }
    
    .progress-bar::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--light-gray);
      z-index: 1;
    }
    
    .progress-step {
      width: 30px;
      height: 30px;
      background: var(--light-gray);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 2;
      color: var(--gray);
      font-weight: 600;
    }
    
    .progress-step::before {
      counter-increment: step;
      content: counter(step);
    }
    
    .progress-step.active {
      background: var(--primary);
      color: white;
      transform: scale(1.1);
      transition: all 0.3s ease;
    }
    
    .progress-step.completed {
      background: var(--success);
      color: white;
    }
    
    .form-step {
      display: none;
      animation: slideIn 0.5s ease-in-out;
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .form-step.active {
      display: block;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-row {
      display: flex;
      gap: 20px;
    }
    
    .form-row .form-group {
      flex: 1;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--dark);
    }
    
    .required::after {
      content: ' *';
      color: var(--danger);
    }
    
    input, select, textarea {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-family: inherit;
      font-size: 16px;
      transition: all 0.3s;
    }
    
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2);
    }
    
    input[type="file"] {
      padding: 10px;
      border: 1px dashed #ccc;
      background: var(--light);
    }
    
    .file-upload-wrapper {
      position: relative;
      margin-bottom: 20px;
    }
    
    .file-upload-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px;
      border: 2px dashed #ccc;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .file-upload-label:hover {
      border-color: var(--primary);
      background: rgba(67, 97, 238, 0.05);
    }
    
    .file-upload-label i {
      font-size: 40px;
      color: var(--primary);
      margin-bottom: 10px;
    }
    
    .file-upload-input {
      position: absolute;
      left: 0;
      top: 0;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }
    
    .file-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }
    
    .file-preview-item {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 5px;
      overflow: hidden;
      border: 1px solid #ddd;
    }
    
    .file-preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .file-preview-item .remove-file {
      position: absolute;
      top: 5px;
      right: 5px;
      background: var(--danger);
      color: white;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 12px;
    }
    
    .btn {
      padding: 12px 25px;
      border: none;
      border-radius: 5px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    
    .btn i {
      margin-right: 8px;
    }
    
    .btn-primary {
      background: var(--primary);
      color: white;
    }
    
    .btn-primary:hover {
      background: var(--secondary);
      transform: translateY(-2px);
      box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
    }
    
    .btn-secondary {
      background: var(--gray);
      color: white;
    }
    
    .btn-secondary:hover {
      background: #5a6268;
    }
    
    .btn-success {
      background: var(--success);
      color: white;
    }
    
    .btn-success:hover {
      background: #3aa8d1;
    }
    
    .btn-block {
      display: block;
      width: 100%;
    }
    
    .btn-otp {
      padding: 8px 15px;
      font-size: 14px;
      margin-left: 10px;
    }
    
    .button-group {
      display: flex;
      justify-content: space-between;
      margin-top: 30px;
    }
    
    .otp-group {
      display: flex;
      align-items: center;
    }
    
    .otp-group input {
      flex: 1;
    }
    
    .otp-group button {
      width: auto;
      margin-left: 10px;
    }
    
    .alert {
      padding: 12px 15px;
      border-radius: 5px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }
    
    .alert-success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    
    .alert-danger {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    
    .services-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    
    .tag {
      background: var(--light);
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 14px;
      display: flex;
      align-items: center;
    }
    
    .tag-remove {
      margin-left: 5px;
      cursor: pointer;
      color: var(--danger);
    }
    
    @media (max-width: 768px) {
      .form-row {
        flex-direction: column;
        gap: 0;
      }
      
      .container {
        padding: 15px;
        margin: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="form-header">
      <h2>Diagnostic Center Registration</h2>
      <p>Please fill in all required information to register your diagnostic center</p>
    </div>
    
    <div class="progress-bar">
      <div class="progress-step active" data-step="1"></div>
      <div class="progress-step" data-step="2"></div>
      <div class="progress-step" data-step="3"></div>
      <div class="progress-step" data-step="4"></div>
      <div class="progress-step" data-step="5"></div>
    </div>
    
    <div class="alert alert-success" id="successAlert"></div>
    <div class="alert alert-danger" id="errorAlert"></div>
    
    <form id="registrationForm">
      <!-- Step 1: Account Verification -->
      <div class="form-step active" id="step-1">
        <div class="form-group">
          <label for="email" class="required">Email Address</label>
          <div class="otp-group">
            <input type="email" id="email" required placeholder="Enter your email address">
            <button type="button" class="btn btn-primary btn-otp" onclick="sendOtp()">
              <i class="fas fa-paper-plane"></i> Send OTP
            </button>
          </div>
        </div>
        
        <div class="form-group" id="otpField" style="display: none;">
          <label for="otp" class="required">Verification Code</label>
          <div class="otp-group">
            <input type="text" id="otp" maxlength="6" placeholder="Enter 6-digit OTP">
            <button type="button" class="btn btn-success btn-otp" onclick="verifyOtp()">
              <i class="fas fa-check"></i> Verify
            </button>
          </div>
        </div>
        
        <div class="form-group">
          <label for="password" class="required">Password</label>
          <input type="password" id="password" required placeholder="Create a strong password">
        </div>
        
        <div class="button-group">
          <!-- Login Button -->
          <button type="button" class="btn btn-primary" onclick="window.location.href='diagnosticLogin.html'">
            Login &nbsp;<i class="fas fa-sign-in-alt" ></i>
          </button>

          <!-- Example Next Step Button -->
          <button type="button" class="btn btn-primary" onclick="nextStep(2)">
            Next &nbsp; <i class="fas fa-arrow-right"></i>
          </button>
        </div>
      </div>
      
      <!-- Step 2: Basic Information -->
      <div class="form-step" id="step-2">
        <div class="form-row">
          <div class="form-group">
            <label for="centerName" class="required">Center Name</label>
            <input type="text" id="centerName" required placeholder="Enter diagnostic center name">
          </div>
          <div class="form-group">
            <label for="ownerName" class="required">Owner Name</label>
            <input type="text" id="ownerName" required placeholder="Enter owner's full name">
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="centerType" class="required">Center Type</label>
            <select id="centerType" required>
              <option value="">Select center type</option>
              <option value="Pathology">Pathology</option>
              <option value="Radiology">Radiology</option>
              <option value="Multi-specialty">Multi-specialty</option>
            </select>
          </div>
          <div class="form-group">
            <label for="registrationNumber" class="required">Registration Number</label>
            <input type="text" id="registrationNumber" required placeholder="Enter registration number">
          </div>
        </div>
        
        <div class="button-group">
          <button type="button" class="btn btn-secondary" onclick="prevStep(1)"><i class="fas fa-arrow-left"></i> Previous</button>
          <button type="button" class="btn btn-primary" onclick="nextStep(3)">Next <i class="fas fa-arrow-right"></i></button>
        </div>
      </div>
      
      <!-- Step 3: Contact & Address -->
      <div class="form-step" id="step-3">
        <div class="form-row">
          <div class="form-group">
            <label for="phone" class="required">Phone Number</label>
            <input type="text" id="phone" maxlength="10" required placeholder="Enter 10-digit phone number">
          </div>
          <div class="form-group">
            <label for="altPhone">Alternate Phone</label>
            <input type="text" id="altPhone" maxlength="10" placeholder="Optional alternate number">
          </div>
        </div>
        
        <div class="form-group">
          <label for="whatsapp">WhatsApp Number</label>
          <input type="text" id="whatsapp" maxlength="10" placeholder="Enter WhatsApp number if different">
        </div>
        
        <div class="form-group">
          <label for="address" class="required">Full Address</label>
          <textarea id="address" rows="3" required placeholder="Enter complete address of your center"></textarea>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="city" class="required">City</label>
            <input type="text" id="city" required placeholder="Enter city">
          </div>
          <div class="form-group">
            <label for="state" class="required">State</label>
            <input type="text" id="state" required placeholder="Enter state">
          </div>
          <div class="form-group">
            <label for="pincode" class="required">Pincode</label>
            <input type="text" id="pincode" maxlength="6" required placeholder="6-digit pincode">
          </div>
        </div>
        
        <div class="form-group">
          <label for="mapUrl">Google Maps Location URL</label>
          <input type="url" id="mapUrl" placeholder="Paste Google Maps link to your location">
        </div>
        
        <div class="button-group">
          <button type="button" class="btn btn-secondary" onclick="prevStep(2)"><i class="fas fa-arrow-left"></i> Previous</button>
          <button type="button" class="btn btn-primary" onclick="nextStep(4)">Next <i class="fas fa-arrow-right"></i></button>
        </div>
      </div>
      
      <!-- Step 4: Documents & Services -->
      <div class="form-step" id="step-4">
        <div class="form-row">
          <div class="form-group">
            <label for="gstNumber">GST Number</label>
            <input type="text" id="gstNumber" placeholder="Enter GST number if available">
          </div>
          <div class="form-group">
            <label for="homeSample">Home Sample Collection</label>
            <select id="homeSample">
              <option value="Yes">Yes</option>
              <option value="No">No</option>
            </select>
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="fromTime">Opening Time</label>
            <input type="time" id="fromTime">
          </div>
          <div class="form-group">
            <label for="toTime">Closing Time</label>
            <input type="time" id="toTime">
          </div>
        </div>
        
        <div class="form-group">
          <label for="services">Services Offered</label>
          <input type="text" id="services" placeholder="e.g., Blood Test, X-Ray, MRI (type and press Enter)">
          <div class="services-tags" id="servicesTags"></div>
        </div>
        
        <div class="form-group">
          <label>Upload Documents</label>
          <div class="file-upload-wrapper">
            <label class="file-upload-label" for="panAadharJpeg">
              <i class="fas fa-id-card"></i>
              <span>PAN/Aadhaar Document</span>
              <small>JPEG or PNG (Max 2MB)</small>
              <input type="file" id="panAadharJpeg" class="file-upload-input" accept="image/jpeg,image/png">
            </label>
          </div>
          <div class="file-preview" id="panAadharPreview"></div>
        </div>
        
        <div class="form-group">
          <div class="file-upload-wrapper">
            <label class="file-upload-label" for="licenseCopyJpeg">
              <i class="fas fa-file-alt"></i>
              <span>License Copy</span>
              <small>JPEG or PNG (Max 2MB)</small>
              <input type="file" id="licenseCopyJpeg" class="file-upload-input" accept="image/jpeg,image/png">
            </label>
          </div>
          <div class="file-preview" id="licensePreview"></div>
        </div>
        
        <div class="button-group">
          <button type="button" class="btn btn-secondary" onclick="prevStep(3)"><i class="fas fa-arrow-left"></i> Previous</button>
          <button type="button" class="btn btn-primary" onclick="nextStep(5)">Next <i class="fas fa-arrow-right"></i></button>
        </div>
      </div>
      
      <!-- Step 5: Bank Details -->
      <div class="form-step" id="step-5">
        <div class="form-row">
          <div class="form-group">
            <label for="accountHolderName" class="required">Account Holder Name</label>
            <input type="text" id="accountHolderName" required placeholder="As per bank records">
          </div>
          <div class="form-group">
            <label for="bankName" class="required">Bank Name</label>
            <input type="text" id="bankName" required placeholder="Name of your bank">
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="accountNumber" class="required">Account Number</label>
            <input type="text" id="accountNumber" required placeholder="Your bank account number">
          </div>
          <div class="form-group">
            <label for="ifscCode" class="required">IFSC Code</label>
            <input type="text" id="ifscCode" required placeholder="Bank branch IFSC code">
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label for="upiId">UPI ID</label>
            <input type="text" id="upiId" placeholder="Your UPI ID for payments">
          </div>
          <div class="form-group">
            <label for="upiQrCodeJpeg">UPI QR Code</label>
            <div class="file-upload-wrapper">
              <label class="file-upload-label" for="upiQrCodeJpeg">
                <i class="fas fa-qrcode"></i>
                <span>Upload UPI QR Code</span>
                <small>JPEG or PNG (Max 2MB)</small>
                <input type="file" id="upiQrCodeJpeg" class="file-upload-input" accept="image/jpeg,image/png">
              </label>
            </div>
            <div class="file-preview" id="upiQrPreview"></div>
          </div>
        </div>
        
        <div class="button-group">
          <button type="button" class="btn btn-secondary" onclick="prevStep(4)"><i class="fas fa-arrow-left"></i> Previous</button>
          <button type="submit" class="btn btn-success"><i class="fas fa-check-circle"></i> Submit Registration</button>
        </div>
      </div>
    </form>
  </div>

  <script>
    const baseUrl = 'https://hitaishihealthcare.com/api/diagnostics';
    let servicesList = [];
    let uploadedFiles = {
      panAadhar: null,
      license: null,
      upiQr: null
    };

    // Initialize form
    document.addEventListener('DOMContentLoaded', function() {
      // Setup file uploads
      setupFileUpload('panAadharJpeg', 'panAadharPreview', 'panAadhar');
      setupFileUpload('licenseCopyJpeg', 'licensePreview', 'license');
      setupFileUpload('upiQrCodeJpeg', 'upiQrPreview', 'upiQr');
      
      // Setup services tags
      document.getElementById('services').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          const service = this.value.trim();
          if (service && !servicesList.includes(service)) {
            servicesList.push(service);
            updateServicesTags();
            this.value = '';
          }
        }
      });
    });

    function setupFileUpload(inputId, previewId, fileKey) {
      const input = document.getElementById(inputId);
      const preview = document.getElementById(previewId);
      
      input.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
          if (file.size > 2 * 1024 * 1024) {
            showAlert('File size should be less than 2MB', 'error');
            return;
          }
          
          const reader = new FileReader();
          reader.onload = function(event) {
            uploadedFiles[fileKey] = {
              name: file.name,
              data: event.target.result
            };
            
            preview.innerHTML = `
              <div class="file-preview-item">
                <img src="${event.target.result}" alt="${file.name}">
                <div class="remove-file" onclick="removeFile('${fileKey}')">&times;</div>
              </div>
            `;
          };
          reader.readAsDataURL(file);
        }
      });
    }
    
    function removeFile(fileKey) {
      uploadedFiles[fileKey] = null;
      document.getElementById(`${fileKey}Preview`).innerHTML = '';
      document.getElementById(`${fileKey}Jpeg`).value = '';
    }
    
    function updateServicesTags() {
      const container = document.getElementById('servicesTags');
      container.innerHTML = servicesList.map(service => `
        <div class="tag">
          ${service}
          <span class="tag-remove" onclick="removeService('${service}')">&times;</span>
        </div>
      `).join('');
    }
    
    function removeService(service) {
      servicesList = servicesList.filter(s => s !== service);
      updateServicesTags();
    }
    
    function showAlert(message, type) {
      const alert = document.getElementById(`${type}Alert`);
      alert.textContent = message;
      alert.style.display = 'block';
      
      setTimeout(() => {
        alert.style.display = 'none';
      }, 5000);
    }
    
    function nextStep(step) {
      // Validate current step before proceeding
      if (!validateStep(step - 1)) {
        return;
      }
      
      // Hide current step
      document.querySelector(`.form-step.active`).classList.remove('active');
      document.querySelector(`.progress-step[data-step="${step - 1}"]`).classList.remove('active');
      
      // Show next step
      document.getElementById(`step-${step}`).classList.add('active');
      document.querySelector(`.progress-step[data-step="${step}"]`).classList.add('active');
      
      // Mark previous step as completed
      document.querySelector(`.progress-step[data-step="${step - 1}"]`).classList.add('completed');
      
      // Scroll to top
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    function prevStep(step) {
      // Hide current step
      document.querySelector(`.form-step.active`).classList.remove('active');
      document.querySelector(`.progress-step[data-step="${step + 1}"]`).classList.remove('active');
      
      // Show previous step
      document.getElementById(`step-${step}`).classList.add('active');
      document.querySelector(`.progress-step[data-step="${step}"]`).classList.add('active');
      
      // Scroll to top
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    
    function validateStep(step) {
      // Step 1 validation
      if (step === 1) {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        if (!email || !isValidEmail(email)) {
          showAlert('Please enter a valid email address', 'error');
          return false;
        }
        
        if (!password || password.length < 8) {
          showAlert('Password must be at least 8 characters long', 'error');
          return false;
        }
        
        if (!document.getElementById('otpField').style.display === 'block') {
          showAlert('Please verify your email with OTP first', 'error');
          return false;
        }
      }
      
      // Step 2 validation
      if (step === 2) {
        const centerName = document.getElementById('centerName').value;
        const ownerName = document.getElementById('ownerName').value;
        const centerType = document.getElementById('centerType').value;
        const regNumber = document.getElementById('registrationNumber').value;
        
        if (!centerName || !ownerName || !centerType || !regNumber) {
          showAlert('Please fill all required fields', 'error');
          return false;
        }
      }
      
      // Add validation for other steps as needed
      
      return true;
    }
    
    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }
    
    async function sendOtp() {
      const email = document.getElementById('email').value;
      
      if (!email || !isValidEmail(email)) {
        showAlert('Please enter a valid email address', 'error');
        return;
      }
      
      try {
        const res = await fetch(`${baseUrl}/send-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        
        const data = await res.json();
        
        if (res.ok) {
          showAlert(data.message || 'OTP sent to your email', 'success');
          document.getElementById('otpField').style.display = 'block';
        } else {
          showAlert(data.error || 'Failed to send OTP', 'error');
        }
      } catch (error) {
        showAlert('Network error. Please try again.', 'error');
      }
    }
    
    async function verifyOtp() {
      const email = document.getElementById('email').value;
      const otp = document.getElementById('otp').value;
      
      if (!email || !otp || otp.length !== 6) {
        showAlert('Please enter a valid 6-digit OTP', 'error');
        return;
      }
      
      try {
        const res = await fetch(`${baseUrl}/verify-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, otp })
        });
        
        const data = await res.json();
        
        if (res.ok) {
          showAlert(data.message || 'Email verified successfully', 'success');
        } else {
          showAlert(data.error || 'Invalid OTP. Please try again.', 'error');
        }
      } catch (error) {
        showAlert('Network error. Please try again.', 'error');
      }
    }
    
    document.getElementById('registrationForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      if (!validateStep(5)) {
        return;
      }
      
      const formData = {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        centerName: document.getElementById('centerName').value,
        ownerName: document.getElementById('ownerName').value,
        centerType: document.getElementById('centerType').value,
        phone: document.getElementById('phone').value,
        altPhone: document.getElementById('altPhone').value,
        whatsapp: document.getElementById('whatsapp').value,
        address: document.getElementById('address').value,
        city: document.getElementById('city').value,
        state: document.getElementById('state').value,
        pincode: document.getElementById('pincode').value,
        mapUrl: document.getElementById('mapUrl').value,
        registrationNumber: document.getElementById('registrationNumber').value,
        gstNumber: document.getElementById('gstNumber').value,
        panAadharJpeg: uploadedFiles.panAadhar ? uploadedFiles.panAadhar.data : null,
        licenseCopyJpeg: uploadedFiles.license ? uploadedFiles.license.data : null,
        services: servicesList,
        homeSample: document.getElementById('homeSample').value,
        operationalHours: document.getElementById('fromTime').value + " - " + document.getElementById('toTime').value,
        accountHolderName: document.getElementById('accountHolderName').value,
        bankName: document.getElementById('bankName').value,
        accountNumber: document.getElementById('accountNumber').value,
        ifscCode: document.getElementById('ifscCode').value,
        upiId: document.getElementById('upiId').value,
        upiQrCodeJpeg: uploadedFiles.upiQr ? uploadedFiles.upiQr.data : null
      };
      
      try {
        const res = await fetch(`${baseUrl}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });
        
        const result = await res.json();
        
        if (res.ok) {
          showAlert('Registration successful! Our team will contact you shortly.', 'success');
          window.location.href = 'diagnosticLogin.html'
          document.getElementById('registrationForm').reset();
          servicesList = [];
          uploadedFiles = { panAadhar: null, license: null, upiQr: null };
          document.querySelectorAll('.file-preview').forEach(el => el.innerHTML = '');
          document.getElementById('servicesTags').innerHTML = '';
          
          // Reset to first step
          document.querySelector('.form-step.active').classList.remove('active');
          document.getElementById('step-1').classList.add('active');
          document.querySelectorAll('.progress-step').forEach(el => {
            el.classList.remove('active', 'completed');
          });
          document.querySelector('.progress-step[data-step="1"]').classList.add('active');
        } else {
          showAlert(result.error || 'Registration failed. Please try again.', 'error');
        }
      } catch (error) {
        showAlert('Network error. Please try again.', 'error');
      }
    });
  </script>
</body>
</html>
