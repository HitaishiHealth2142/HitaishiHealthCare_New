<!DOCTYPE html>
<html>
<head>
  <title>Unified Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Adding Bootstrap for Modal styling -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 20px; }
  </style>
</head>
<body>
  <div class="container" style="max-width: 400px;">
    <h2>Login</h2>
    <form id="loginForm">
      <div class="mb-3">
        <input type="email" class="form-control" id="email" placeholder="Email" required>
      </div>
      <div class="mb-3">
        <input type="password" class="form-control" id="password" placeholder="Password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
    <p id="message" class="mt-3 text-center"></p>
    <div class="text-center mt-3">
      <a href="#" data-bs-toggle="modal" data-bs-target="#forgotPasswordModal">Forgot Password?</a>
    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div class="modal fade" id="forgotPasswordModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Reset Password</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="reset-message" class="alert" style="display: none;"></div>
          
          <!-- Step 1: Enter Email -->
          <div id="step1">
            <p>Enter your registered email to receive an OTP.</p>
            <input type="email" id="resetEmail" class="form-control" placeholder="Your Email Address">
            <button id="sendOtpBtn" class="btn btn-primary w-100 mt-2">Send OTP</button>
          </div>

          <!-- Step 2: Verify OTP -->
          <div id="step2" style="display: none;">
            <p>Enter the OTP sent to your email.</p>
            <input type="text" id="otp" class="form-control" placeholder="6-Digit OTP">
            <button id="verifyOtpBtn" class="btn btn-primary w-100 mt-2">Verify OTP</button>
          </div>

          <!-- Step 3: Reset Password -->
          <div id="step3" style="display: none;">
            <p>Enter your new password.</p>
            <input type="password" id="newPassword" class="form-control" placeholder="New Password">
            <button id="resetPasswordBtn" class="btn btn-success w-100 mt-2">Reset Password</button>
          </div>
        </div>
      </div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// --- Standard Login Logic ---
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const message = document.getElementById("message");

  try {
    const res = await fetch("/api/unified-login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: "include",
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (res.ok && data.success) {
      message.className = 'mt-3 text-center text-success';
      message.textContent = "Login successful! Redirecting...";
      
      // Store necessary info in localStorage and redirect
      if (data.role === "doctor") {
        localStorage.setItem("doctorUid", data.user.uid);
        window.location.href = "doctorProfile.html";
      } else if (data.role === "patient") {
        localStorage.setItem("userId", data.user.id);
        window.location.href = "patientProfile.html";
      } else if (data.role === "diagnostic") {
        localStorage.setItem("diagnosticId", data.user.id);
        localStorage.setItem("diagnosticCenterId", data.user.center_id);
        window.location.href = "diagnosticProfile.html";
      }
    } else {
      message.className = 'mt-3 text-center text-danger';
      message.textContent = data.error || "Login failed";
    }
  } catch (err) {
    console.error(err);
    message.className = 'mt-3 text-center text-danger';
    message.textContent = "A network error occurred.";
  }
});


// --- Forgot Password Logic ---
const resetMsg = document.getElementById('reset-message');
const sendOtpBtn = document.getElementById('sendOtpBtn');
const verifyOtpBtn = document.getElementById('verifyOtpBtn');
const resetPasswordBtn = document.getElementById('resetPasswordBtn');

let userEmailForReset = ''; // To store the email across steps

function showResetMessage(message, type) {
  resetMsg.textContent = message;
  resetMsg.className = `alert alert-${type}`;
  resetMsg.style.display = 'block';
}

// Step 1: Send OTP
sendOtpBtn.addEventListener('click', async () => {
  userEmailForReset = document.getElementById('resetEmail').value;
  if (!userEmailForReset) return showResetMessage('Please enter an email.', 'danger');
  
  sendOtpBtn.disabled = true;
  sendOtpBtn.textContent = 'Sending...';

  const res = await fetch('/api/unified-password/send-otp', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: userEmailForReset })
  });
  const data = await res.json();

  if (res.ok) {
    showResetMessage(data.message, 'success');
    document.getElementById('step1').style.display = 'none';
    document.getElementById('step2').style.display = 'block';
  } else {
    showResetMessage(data.error, 'danger');
  }
  sendOtpBtn.disabled = false;
  sendOtpBtn.textContent = 'Send OTP';
});

// Step 2: Verify OTP
verifyOtpBtn.addEventListener('click', async () => {
  const otp = document.getElementById('otp').value;
  if (!otp) return showResetMessage('Please enter the OTP.', 'danger');

  verifyOtpBtn.disabled = true;
  verifyOtpBtn.textContent = 'Verifying...';

  const res = await fetch('/api/unified-password/verify-otp', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: userEmailForReset, otp })
  });
  const data = await res.json();
  
  if (res.ok) {
    showResetMessage(data.message, 'success');
    document.getElementById('step2').style.display = 'none';
    document.getElementById('step3').style.display = 'block';
  } else {
    showResetMessage(data.error, 'danger');
  }
  verifyOtpBtn.disabled = false;
  verifyOtpBtn.textContent = 'Verify OTP';
});

// Step 3: Reset Password
resetPasswordBtn.addEventListener('click', async () => {
  const newPassword = document.getElementById('newPassword').value;
  const otp = document.getElementById('otp').value; // Need OTP for final verification
  if (!newPassword) return showResetMessage('Please enter a new password.', 'danger');

  resetPasswordBtn.disabled = true;
  resetPasswordBtn.textContent = 'Resetting...';

  const res = await fetch('/api/unified-password/reset-password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: userEmailForReset, otp, newPassword })
  });
  const data = await res.json();
  
  if (res.ok) {
    showResetMessage(data.message, 'success');
    setTimeout(() => {
        // Close modal and reload page
        const modal = bootstrap.Modal.getInstance(document.getElementById('forgotPasswordModal'));
        modal.hide();
        location.reload();
    }, 2000);
  } else {
    showResetMessage(data.error, 'danger');
    resetPasswordBtn.disabled = false;
    resetPasswordBtn.textContent = 'Reset Password';
  }
});
</script>
</body>
</html>
