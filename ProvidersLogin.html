<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Provider Login | Hitaishi Healthcare</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
  body {
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #0f766e, #0ea5e9);
    min-height: 100vh;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    background: #ffffff;
    width: 100%;
    max-width: 420px;
    border-radius: 12px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    padding: 25px;
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #0f172a;
  }

  input {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 6px;
    border: 1px solid #cbd5e1;
    font-size: 14px;
  }

  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
    color: #ffffff;
  }

  .btn-primary { background: #2563eb; }
  .btn-success { background: #16a34a; }
  .btn-warning { background: #7c3aed; }
  .btn-danger  { background: #dc2626; }

  .link {
    text-align: center;
    margin-top: 10px;
    font-size: 13px;
    color: #2563eb;
    cursor: pointer;
  }

  .hidden { display: none; }

  .msg {
    text-align: center;
    margin-top: 12px;
    font-size: 14px;
  }

  .msg.error { color: #dc2626; }
  .msg.success { color: #16a34a; }
</style>
</head>

<body>

<div class="card">
  <h2>Provider Login</h2>

  <!-- LOGIN -->
  <div id="loginBox">
    <input type="text" id="provider_uid" placeholder="Provider ID (HH-AMB-XXXXXX)">
    <input type="email" id="login_email" placeholder="Registered Email">

    <button class="btn-primary" onclick="login()">Login</button>

    <div class="link" onclick="showForgot()">Forgot Password?</div>
  </div>

  <!-- FORGOT PASSWORD -->
  <div id="forgotBox" class="hidden">
    <input type="email" id="forgot_email" placeholder="Registered Email">

    <button class="btn-success" onclick="sendOTP()">Send OTP</button>

    <div class="link" onclick="backToLogin()">Back to Login</div>
  </div>

  <!-- OTP VERIFY -->
  <div id="otpBox" class="hidden">
    <input type="text" id="otp" placeholder="Enter OTP">

    <button class="btn-warning" onclick="verifyOTP()">Verify OTP</button>
  </div>

  <!-- RESET PASSWORD -->
  <div id="resetBox" class="hidden">
    <input type="password" id="new_password" placeholder="New Password">
    <input type="password" id="confirm_password" placeholder="Confirm Password">

    <button class="btn-danger" onclick="resetPassword()">Reset Password</button>
  </div>

  <div id="msg" class="msg"></div>
</div>

<script>
let savedEmail = "";

/* UI helpers */
function showForgot() {
  hideAll();
  document.getElementById("forgotBox").classList.remove("hidden");
}

function backToLogin() {
  hideAll();
  document.getElementById("loginBox").classList.remove("hidden");
}

function hideAll() {
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("forgotBox").classList.add("hidden");
  document.getElementById("otpBox").classList.add("hidden");
  document.getElementById("resetBox").classList.add("hidden");
  setMsg("");
}

function setMsg(text, type="") {
  const msg = document.getElementById("msg");
  msg.className = "msg " + type;
  msg.innerText = text;
}

/* LOGIN */
async function login() {
  const provider_uid = document.getElementById("provider_uid").value.trim();
  const contact_email = document.getElementById("login_email").value.trim();

  if (!provider_uid || !contact_email) {
    setMsg("Please enter Provider ID and Email", "error");
    return;
  }

  const res = await fetch("/api/providers/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ provider_uid, contact_email })
  });

  const data = await res.json();

  if (!res.ok) {
    setMsg(data.error || "Login failed", "error");
    return;
  }

  setMsg("Login successful. Redirecting...", "success");

  // Example redirect
  window.location.href = "/provider-dashboard.html";
}

/* SEND OTP */
async function sendOTP() {
  savedEmail = document.getElementById("forgot_email").value.trim();

  if (!savedEmail) {
    setMsg("Please enter your registered email", "error");
    return;
  }

  const res = await fetch("/api/providers/forgot-password", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email: savedEmail })
  });

  const data = await res.json();

  if (!res.ok) {
    setMsg(data.error || "Failed to send OTP", "error");
    return;
  }

  hideAll();
  document.getElementById("otpBox").classList.remove("hidden");
  setMsg("OTP sent to your email", "success");
}

/* VERIFY OTP */
async function verifyOTP() {
  const otp = document.getElementById("otp").value.trim();

  if (!otp) {
    setMsg("Enter OTP", "error");
    return;
  }

  const res = await fetch("/api/providers/verify-otp", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email: savedEmail, otp })
  });

  const data = await res.json();

  if (!res.ok) {
    setMsg(data.error || "Invalid OTP", "error");
    return;
  }

  hideAll();
  document.getElementById("resetBox").classList.remove("hidden");
  setMsg("OTP verified. Set new password.", "success");
}

/* RESET PASSWORD */
async function resetPassword() {
  const new_password = document.getElementById("new_password").value;
  const confirm_password = document.getElementById("confirm_password").value;

  if (!new_password || !confirm_password) {
    setMsg("Enter all fields", "error");
    return;
  }

  if (new_password !== confirm_password) {
    setMsg("Passwords do not match", "error");
    return;
  }

  const res = await fetch("/api/providers/reset-password", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email: savedEmail, new_password })
  });

  const data = await res.json();

  if (!res.ok) {
    setMsg(data.error || "Password reset failed", "error");
    return;
  }

  hideAll();
  document.getElementById("loginBox").classList.remove("hidden");
  setMsg("Password reset successful. Please login.", "success");
}
</script>

</body>
</html>
