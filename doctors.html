<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hitaishi Healthcare - Find a Specialist</title>
    <!-- Using Font Awesome CSS from CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- IMPORTANT: Replace YOUR_API_KEY with your actual Google Maps API key -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDqW6tsp_sUG5-Xf6aXFzYuqrvRiGehGXg&libraries=places" async defer></script>
    
    
  <style>
        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b1;
            --secondary: #4ecdc4;
            --accent: #ff6b6b;
            --light: #f8f9fa;
            --dark: #343a40;
            --gray: #6c757d;
            --light-gray: #e9ecef;
            --success: #28a745;
            --danger: #dc3545;
            --border-radius: 10px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .responsive-container {
            display: flex;
            height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        /* Left Side - Doctors List */
        .doctors-container {
            width: 40%;
            background-color: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            height: calc(100vh - 40px); /* Key property to contain the list */
        }

        .doctors-header {
            padding: 20px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border-top-left-radius: var(--border-radius);
            border-top-right-radius: var(--border-radius);
        }

        .doctors-header h2 {
            margin: 0;
            font-weight: 600;
            font-size: 1.5rem;
        }

        .filters-container {
            padding: 15px 20px;
            background-color: white;
            border-bottom: 1px solid var(--light-gray);
        }

        .filters {
            display: flex;
            gap: 10px;
        }

        select, input {
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            transition: var(--transition);
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.2);
        }

        #specializationFilter {
            flex-grow: 1;
        }

        #experienceFilter {
            width: 150px;
        }

        .doctors-list {
            flex-grow: 1; /* Allows this element to fill available space */
            overflow-y: auto; /* This makes the list scrollable */
            padding: 10px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .doctor-card {
            border: 1px solid #eaeaea;
            border-radius: var(--border-radius);
            padding: 15px;
            cursor: pointer;
            transition: var(--transition);
            background: white;
        }

        .doctor-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow);
            border-color: var(--primary);
        }

        .doctor-card.active {
            border-color: var(--primary);
            background-color: #f0f7ff;
        }

        .doctor-card-content {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .doctor-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--light-gray);
        }

        .doctor-info {
            flex-grow: 1;
        }

        .doctor-name {
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 5px;
            font-size: 1.1rem;
        }

        .doctor-specialization {
            color: var(--primary);
            font-weight: 500;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .doctor-details {
            display: flex;
            gap: 15px;
            font-size: 0.85rem;
            color: var(--gray);
        }

        .doctor-experience {
            color: var(--success);
            font-weight: 500;
        }

        .doctor-fee {
            text-align: right;
            font-weight: 600;
            color: var(--primary);
            white-space: nowrap;
        }

        /* Right Side - Map and Details */
        .details-map-container {
            width: 60%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: calc(100vh - 40px); /* Key property for single scroll */
            overflow-y: auto; /* Makes the entire right column scrollable */
        }

        .doctor-details-container {
            background-color: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            flex-shrink: 0; /* Prevents container from shrinking */
        }

        .doctor-details-header {
            padding: 15px 20px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .doctor-details-header h3 {
            margin: 0;
            font-weight: 600;
        }

        .doctor-details-content {
            padding: 20px;
            /* No longer needs its own scrollbar or fixed height */
        }

        .details-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--gray);
        }

        .details-placeholder i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: #d1d7dc;
        }

        .location-search-container {
            background-color: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 20px;
            flex-shrink: 0;
        }

        .search-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        #locationSearch {
            flex-grow: 1;
        }

        .location-btn {
            padding: 12px 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            transition: var(--transition);
            white-space: nowrap;
        }

        .location-btn:hover {
            background-color: var(--primary-dark);
        }

        .popular-areas {
            margin-top: 15px;
        }

        .popular-areas-title {
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--dark);
        }

        .areas-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .area-chip {
            padding: 8px 15px;
            background-color: var(--light);
            border-radius: 20px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
        }

        .area-chip:hover {
            background-color: var(--primary);
            color: white;
        }

        #map {
            height: 400px;
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            flex-shrink: 0;
        }

        /* Doctor Details View */
        .detail-section {
            margin-bottom: 20px;
        }

        .detail-section h4 {
            color: var(--primary);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .doctor-main-info {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .info-column {
            flex: 1;
            min-width: 250px;
        }

        .info-item {
            margin-bottom: 8px;
            display: flex;
        }

        .info-label {
            font-weight: 600;
            min-width: 120px;
            color: var(--dark);
        }

        .about-doctor {
            background-color: var(--light);
            padding: 15px;
            border-radius: var(--border-radius);
            margin-bottom: 20px;
        }

        .appointment-section {
            margin-top: 25px;
        }

        .date-input {
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            width: 100%;
            font-family: 'Poppins', sans-serif;
            margin-bottom: 15px;
        }

        .time-slots-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .time-slot {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: white;
            cursor: pointer;
            transition: var(--transition);
        }

        .time-slot:hover {
            border-color: var(--primary);
            background-color: #f0f7ff;
        }

        .time-slot.selected {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .time-slot.booked {
            background-color: var(--light-gray);
            color: var(--gray);
            cursor: not-allowed;
            text-decoration: line-through;
        }

        .submit-btn {
            padding: 12px 25px;
            background-color: var(--success);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            transition: var(--transition);
            display: block;
            width: 100%;
            text-align: center;
            font-size: 1rem;
        }

        .submit-btn:hover {
            background-color: #218838;
        }
        
        .submit-btn:disabled {
            background-color: var(--gray);
            cursor: not-allowed;
        }

        /* Custom Notification Toast */
        .notification-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: var(--border-radius);
            color: white;
            font-weight: 500;
            z-index: 1000;
            box-shadow: 0 5px 20px rgba(0,0,0,0.25);
            opacity: 0;
            transform: translateY(-20px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
        }
        .notification-toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        .notification-toast.error { background: linear-gradient(135deg, #e57373, var(--danger)); }
        .notification-toast.success { background: linear-gradient(135deg, #81c784, var(--success)); }
        .notification-toast.info { background: linear-gradient(135deg, #64b5f6, var(--primary)); }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .responsive-container {
                flex-direction: column;
                height: auto; /* Allow page to scroll on smaller screens */
            }

            .doctors-container {
                width: 100%;
                height: auto; /* Let content define height */
                max-height: 60vh; /* Make list scrollable beyond this height */
            }

            .details-map-container {
                width: 100%;
                height: auto; /* Let content define height */
            }
        }

        @media (max-width: 768px) {
            .responsive-container {
                padding: 15px;
                gap: 15px;
            }

            .filters {
                flex-direction: column;
            }

            #experienceFilter {
                width: 100%;
            }

            .search-row {
                flex-direction: column;
            }

            .doctor-card-content {
                flex-direction: column;
                text-align: center;
            }

            .doctor-fee {
                text-align: center;
                margin-top: 10px;
            }

            .doctor-main-info {
                flex-direction: column;
            }
        }

        /* Loading animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Custom alert/message box */
        #bookingMessage {
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: 500;
            text-align: center;
            display: none; /* Hidden by default */
        }
        #bookingMessage.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        #bookingMessage.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
  </style>
</head>
<body>

<!-- Main Content -->
<div class="responsive-container">
    <!-- Left Side - Doctors List -->
    <div class="doctors-container">
        <div class="doctors-header">
            <h2><i class="fas fa-user-md"></i> Find a Specialist</h2>
        </div>
        
        <div class="filters-container">
            <div class="filters">
                <select id="specializationFilter" aria-label="Filter by specialization">
                    <option value="">All Specializations</option>
                </select>
                <select id="experienceFilter" aria-label="Filter by experience">
                    <option value="">Any Experience</option>
                    <option value="5">5+ years</option>
                    <option value="10">10+ years</option>
                    <option value="15">15+ years</option>
                </select>
            </div>
        </div>

        <!-- Doctors List -->
        <div id="doctorsList" class="doctors-list">
            <!-- Doctors will be loaded here dynamically -->
        </div>
    </div>

    <!-- Right Side - Map and Location Details -->
    <div class="details-map-container">
        <!-- Selected Doctor Details -->
        <div class="doctor-details-container">
            <div class="doctor-details-header">
                <h3><i class="fas fa-info-circle"></i> Doctor Information</h3>
            </div>
            <div id="doctorDetails" class="doctor-details-content">
                <div class="details-placeholder">
                    <i class="fas fa-stethoscope"></i>
                    <p>Select a doctor to view details and book an appointment</p>
                </div>
            </div>
        </div>

        <!-- Location Search -->
        <div class="location-search-container">
            <div class="search-row">
                <input type="text" id="locationSearch" placeholder="Search location...">
                <button class="location-btn" onclick="useCurrentLocation()">
                    <i class="fas fa-location-arrow"></i> Current Location
                </button>
            </div>
            <div class="popular-areas">
                <p class="popular-areas-title">Popular Areas:</p>
                <div class="areas-list">
                    <span class="area-chip">Hyderabad</span>
                    <span class="area-chip">Secunderabad</span>
                    <span class="area-chip">Gachibowli</span>
                    <span class="area-chip">Banjara Hills</span>
                </div>
            </div>
        </div>

        <!-- Map Container -->
        <div id="map"></div>
    </div>
</div>

<script>
'use strict';

let allDoctors = [];
let map;
let markers = [];
let selectedDoctor = null;
let selectedSlot = null;
let autocomplete;

document.addEventListener('DOMContentLoaded', () => {
  // Simulating a logged-in user for demonstration.
  // In a real app, this would be set after a successful login.
  sessionStorage.setItem('patientUser', JSON.stringify({
      id: 123,
      firstName: 'John',
      lastName: 'Doe',
      email: 'john.doe@example.com',
      mobile: '9876543210'
  }));

  fetchDoctors();
  setupEventListeners();
});

// This function is called by the Google Maps script when it loads.
function initMap() {
  const hyderabad = { lat: 17.3850, lng: 78.4867 };
  map = new google.maps.Map(document.getElementById("map"), {
    center: hyderabad,
    zoom: 12,
  });

  const input = document.getElementById("locationSearch");
  autocomplete = new google.maps.places.Autocomplete(input);
  autocomplete.bindTo("bounds", map);

  autocomplete.addListener("place_changed", () => {
    const place = autocomplete.getPlace();
    if (!place.geometry || !place.geometry.location) {
        showNotification(`Could not find location: ${input.value}`, 'error');
        return;
    }
    map.setCenter(place.geometry.location);
    map.setZoom(14);
  });
}

async function fetchDoctors() {
  const doctorsList = document.getElementById('doctorsList');
  doctorsList.innerHTML = `<div style="text-align: center; padding: 30px;"><div class="loading" style="border-top-color: var(--primary);"></div><p>Loading Doctors...</p></div>`;
  try {
    const url = 'https://www.hitaishihealthcare.com/api/getdoctors';
    const response = await fetch(url);
    if (!response.ok) {
      throw new Error(`HTTP ${response.status} - ${response.statusText}`);
    }

    const data = await response.json();
    allDoctors = data;

    populateSpecializationFilter();
    displayDoctors(allDoctors);
    updateMapMarkers(allDoctors);
    
    handleUrlParameters();

  } catch (error) {
    console.error("❌ Error fetching doctors:", error);
    doctorsList.innerHTML =
      `<p style="color: var(--danger); padding: 20px; text-align: center;">Failed to load doctors: ${error.message}</p>`;
  }
}

function handleUrlParameters() {
    const urlParams = new URLSearchParams(window.location.search);
    const doctorIdFromUrl = urlParams.get('id');
    const specializationFromUrl = urlParams.get('specialization');

    if (doctorIdFromUrl) {
        const doctorToShow = allDoctors.find(doc => doc.uid === doctorIdFromUrl);
        if (doctorToShow) {
            showDoctorDetails(doctorToShow);
            const doctorCard = document.querySelector(`.doctor-card[data-uid='${doctorIdFromUrl}']`);
            if(doctorCard){
                doctorCard.classList.add('active');
                doctorCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
    } else if (specializationFromUrl) {
        document.getElementById('specializationFilter').value = specializationFromUrl;
        filterDoctors();
    }
}

function populateSpecializationFilter() {
    const specializationFilter = document.getElementById('specializationFilter');
    const specializations = [...new Set(allDoctors.map(doc => doc.specialization))].sort();
    
    specializations.forEach(spec => {
        if(spec) {
            const option = document.createElement('option');
            option.value = spec;
            option.textContent = spec;
            specializationFilter.appendChild(option);
        }
    });
}


function displayDoctors(doctors) {
  const doctorsList = document.getElementById('doctorsList');
  doctorsList.innerHTML = '';

  if (doctors.length === 0) {
    doctorsList.innerHTML = `
      <div style="text-align: center; padding: 30px; color: var(--gray);">
        <i class="fas fa-search" style="font-size: 2rem; margin-bottom: 15px;"></i>
        <p>No doctors found matching your criteria.</p>
      </div>
    `;
    return;
  }

  doctors.forEach(doctor => {
    const doctorCard = document.createElement('div');
    doctorCard.className = 'doctor-card';
    doctorCard.dataset.uid = doctor.uid;

    doctorCard.onclick = () => {
      document.querySelectorAll('.doctor-card').forEach(card => card.classList.remove('active'));
      doctorCard.classList.add('active');
      showDoctorDetails(doctor);
    };

    doctorCard.innerHTML = `
      <div class="doctor-card-content">
        <img src="https://placehold.co/100x100/E2E8F0/4A5568?text=Dr" alt="Doctor Avatar" class="doctor-avatar">
        <div class="doctor-info">
          <h3 class="doctor-name">Dr. ${doctor.first_name || ''} ${doctor.last_name || ''}</h3>
          <p class="doctor-specialization">${doctor.specialization || 'N/A'}</p>
          <div class="doctor-details">
            <span class="doctor-experience"><i class="fas fa-award"></i> ${doctor.experience || '0'} years</span>
            <span><i class="fas fa-hospital"></i> ${doctor.clinic || 'N/A'}</span>
          </div>
        </div>
        <div class="doctor-fee">
          ₹${Math.floor(Math.random() * 500) + 500}
        </div>
      </div>
    `;
    doctorsList.appendChild(doctorCard);
  });
}

function showDoctorDetails(doctor) {
  selectedDoctor = doctor;
  const detailsDiv = document.getElementById('doctorDetails');
  const today = new Date().toISOString().split('T')[0];

  detailsDiv.innerHTML = `
    <div>
      <h3 style="color: var(--primary); margin-top: 0; margin-bottom: 15px;">Dr. ${doctor.first_name} ${doctor.last_name}</h3>
      <div class="doctor-main-info">
        <div class="info-column">
          <div class="info-item"><span class="info-label">Specialization:</span><span>${doctor.specialization || 'N/A'}</span></div>
          <div class="info-item"><span class="info-label">Experience:</span><span>${doctor.experience || 'N/A'} years</span></div>
          <div class="info-item"><span class="info-label">Clinic:</span><span>${doctor.clinic || 'N/A'}</span></div>
        </div>
        <div class="info-column">
          <div class="info-item"><span class="info-label">Availability:</span><span>${doctor.availability || 'N/A'}</span></div>
          <div class="info-item"><span class="info-label">Timings:</span><span>${doctor.from_time || 'N/A'} - ${doctor.to_time || 'N/A'}</span></div>
          <div class="info-item"><span class="info-label">Contact:</span><span>${doctor.mobile || 'N/A'}</span></div>
        </div>
      </div>
      <div class="detail-section"><div class="info-item"><span class="info-label">Address:</span><span>${doctor.address || 'N/A'}</span></div></div>
      <div class="about-doctor">
        <h4>About Doctor</h4>
        <p>Dr. ${doctor.first_name} graduated with a degree in ${doctor.degree || 'N/A'} from ${doctor.university || 'N/A'} and has ${doctor.experience || 'N/A'} years of experience in ${doctor.specialization || 'N/A'}.</p>
      </div>
      <div class="appointment-section">
        <h4>Book Appointment</h4>
        <label for="appointmentDate">Select Appointment Date:</label>
        <input type="date" id="appointmentDate" class="date-input" min="${today}" onchange="loadTimeSlots('${doctor.uid}', '${doctor.from_time}', '${doctor.to_time}')">
        <div id="timeSlots" class="time-slots-container"></div>
        <div id="bookingMessage"></div>
      </div>
    </div>
  `;
}

function loadTimeSlots(doctorUid, fromTime, toTime) {
  const date = document.getElementById("appointmentDate").value;
  if (!date) return;

  const slotContainer = document.getElementById("timeSlots");
  slotContainer.innerHTML = "<p>Loading available slots...</p>";
  document.getElementById("bookingMessage").style.display = 'none';

  fetch(`https://www.hitaishihealthcare.com/api/getBookedSlots?doctorUid=${doctorUid}&date=${date}`)
    .then(res => res.ok ? res.json() : res.json().then(err => Promise.reject(err)))
    .then(bookedSlots => {
      if (!Array.isArray(bookedSlots)) throw new Error("Invalid data for booked slots.");
      
      slotContainer.innerHTML = '';
      selectedSlot = null;

      const start = fromTime ? new Date(`1970-01-01T${fromTime}`) : null;
      const end = toTime ? new Date(`1970-01-01T${toTime}`) : null;

      if (!start || !end || isNaN(start) || isNaN(end)) {
        slotContainer.innerHTML = `<p style="color: red;">Doctor's timings are not available.</p>`;
        return;
      }

      let hasSlots = false;
      while (start < end) {
        hasSlots = true;
        const slotTime = start.toTimeString().substring(0, 5);
        const isBooked = bookedSlots.includes(slotTime);
        const slotBtn = document.createElement('div');
        slotBtn.className = `time-slot ${isBooked ? 'booked' : 'available'}`;
        slotBtn.textContent = slotTime;

        if (!isBooked) {
          slotBtn.onclick = function() {
            document.querySelectorAll('.time-slot.available').forEach(s => s.classList.remove('selected'));
            this.classList.add('selected');
            selectedSlot = slotTime;
            document.getElementById('bookBtn').disabled = false;
          };
        }
        slotContainer.appendChild(slotBtn);
        start.setMinutes(start.getMinutes() + 30);
      }
      
      if (hasSlots) {
          const submitBtn = document.createElement('button');
          submitBtn.id = 'bookBtn';
          submitBtn.className = 'submit-btn';
          submitBtn.textContent = 'Book Appointment';
          submitBtn.disabled = true;
          submitBtn.onclick = () => submitBooking(date); 
          slotContainer.after(submitBtn);
      } else {
          slotContainer.innerHTML = `<p>No available slots for this day.</p>`;
      }
    })
    .catch(err => {
      console.error("Slot load error:", err);
      slotContainer.innerHTML = `<p style="color:red;">Unable to load time slots: ${err.message || 'Server error'}</p>`;
    });
}

async function submitBooking(date) {
  const bookingMessageDiv = document.getElementById('bookingMessage');
  bookingMessageDiv.style.display = 'none';
  
  const patientInfo = JSON.parse(sessionStorage.getItem('patientUser'));
  if (!patientInfo) {
    showNotification("Please login to book an appointment.", 'info');
    setTimeout(() => window.location.href = 'login.html', 1500);
    return;
  }

  if (!selectedSlot || !selectedDoctor) {
    bookingMessageDiv.className = 'error';
    bookingMessageDiv.textContent = 'Please select a doctor and a time slot.';
    return;
  }

  const bookingDetails = {
    patientId: patientInfo.id, patientName: `${patientInfo.firstName} ${patientInfo.lastName}`,
    patientEmail: patientInfo.email, patientMobile: patientInfo.mobile,
    doctorId: selectedDoctor.id, doctorUid: selectedDoctor.uid,
    doctorName: `Dr. ${selectedDoctor.first_name} ${selectedDoctor.last_name}`,
    doctorEmail: selectedDoctor.email, doctorMobile: selectedDoctor.mobile,
    doctorSpecialization: selectedDoctor.specialization,
    appointmentDate: date, appointmentTime: selectedSlot
  };

  const bookBtn = document.getElementById('bookBtn');
  bookBtn.disabled = true;
  bookBtn.innerHTML = '<span class="loading"></span> Booking...';

  try {
    const response = await fetch('https://www.hitaishihealthcare.com/api/appointments', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(bookingDetails)
    });
    const data = await response.json();
    if (!response.ok) throw new Error(data.message || 'Booking failed.');

    bookingMessageDiv.className = 'success';
    bookingMessageDiv.textContent = data.message;
    document.getElementById('timeSlots').innerHTML = '';
    bookBtn.remove();
  } catch (error) {
    console.error('Booking Error:', error);
    bookingMessageDiv.className = 'error';
    bookingMessageDiv.textContent = error.message;
    bookBtn.disabled = false;
    bookBtn.textContent = 'Book Appointment';
  }
}

function updateMapMarkers(doctors) {
  markers.forEach(marker => marker.setMap(null));
  markers = [];
  const geocoder = new google.maps.Geocoder();

  doctors.forEach(doctor => {
    if (doctor.address) {
      geocoder.geocode({ address: doctor.address }, (results, status) => {
        if (status === "OK" && results[0]) {
          const marker = new google.maps.Marker({
            map: map,
            position: results[0].geometry.location,
            title: `Dr. ${doctor.first_name} ${doctor.last_name} - ${doctor.clinic}`,
          });
          markers.push(marker);
          marker.addListener('click', () => {
            const card = document.querySelector(`.doctor-card[data-uid='${doctor.uid}']`);
            if (card) {
                card.click();
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
          });
        }
      });
    }
  });
}

function setupEventListeners() {
  document.getElementById('specializationFilter').addEventListener('change', filterDoctors);
  document.getElementById('experienceFilter').addEventListener('change', filterDoctors);
  document.querySelectorAll('.area-chip').forEach(chip => {
    chip.addEventListener('click', function () {
      const area = this.textContent;
      document.getElementById('locationSearch').value = area;
      const geocoder = new google.maps.Geocoder();
      geocoder.geocode({ address: area + ', Hyderabad' }, (results, status) => {
        if (status === "OK" && results[0]) {
          map.setCenter(results[0].geometry.location);
          map.setZoom(14);
        }
      });
    });
  });
}

function filterDoctors() {
  const specialization = document.getElementById('specializationFilter').value;
  const experience = document.getElementById('experienceFilter').value;
  let filtered = allDoctors;
  if (specialization) {
    filtered = filtered.filter(doc => doc.specialization === specialization);
  }
  if (experience) {
    filtered = filtered.filter(doc => parseInt(doc.experience) >= parseInt(experience));
  }
  displayDoctors(filtered);
  updateMapMarkers(filtered);
}

function useCurrentLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        const location = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        map.setCenter(location);
        map.setZoom(14);
        const geocoder = new google.maps.Geocoder();
        geocoder.geocode({ location }, (results, status) => {
          if (status === "OK" && results[0]) {
            document.getElementById('locationSearch').value = results[0].formatted_address;
          }
        });
      },
      () => showNotification("Unable to retrieve your location.", 'error')
    );
  } else {
    showNotification("Geolocation is not supported by your browser.", 'error');
  }
}

function showNotification(message, type = 'info') {
    const existingToast = document.querySelector('.notification-toast');
    if (existingToast) existingToast.remove();
    const toast = document.createElement('div');
    toast.className = `notification-toast ${type}`;
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.classList.add('show'), 100);
    setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
    }, 4000);
}

</script>
