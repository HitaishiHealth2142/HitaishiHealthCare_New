<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hitaishi Healthcare Services - Find a Specialist</title>
    <script defer src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDqW6tsp_sUG5-Xf6aXFzYuqrvRiGehGXg&libraries=places"></script>
    
    
  <style>
        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b1;
            --secondary: #4ecdc4;
            --accent: #ff6b6b;
            --light: #f8f9fa;
            --dark: #343a40;
            --gray: #6c757d;
            --light-gray: #e9ecef;
            --success: #28a745;
            --border-radius: 10px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .responsive-container {
            display: flex;
            min-height: calc(100vh - 80px);
            padding: 20px;
            gap: 20px;
        }

        /* Left Side - Doctors List */
        .doctors-container {
            width: 40%;
            background-color: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .doctors-header {
            padding: 20px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .doctors-header h2 {
            margin: 0;
            font-weight: 600;
            font-size: 1.5rem;
        }

        .filters-container {
            padding: 15px 20px;
            background-color: white;
            border-bottom: 1px solid var(--light-gray);
        }

        .filters {
            display: flex;
            gap: 10px;
        }

        select, input {
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            transition: var(--transition);
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.2);
        }

        #specializationFilter {
            flex-grow: 1;
        }

        #experienceFilter {
            width: 150px;
        }

        .doctors-list {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .doctor-card {
            border: 1px solid #eaeaea;
            border-radius: var(--border-radius);
            padding: 15px;
            cursor: pointer;
            transition: var(--transition);
            background: white;
        }

        .doctor-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow);
            border-color: var(--primary);
        }

        .doctor-card.active {
            border-color: var(--primary);
            background-color: #f0f7ff;
        }

        .doctor-card-content {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .doctor-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--light-gray);
        }

        .doctor-info {
            flex-grow: 1;
        }

        .doctor-name {
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 5px;
            font-size: 1.1rem;
        }

        .doctor-specialization {
            color: var(--primary);
            font-weight: 500;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .doctor-details {
            display: flex;
            gap: 15px;
            font-size: 0.85rem;
            color: var(--gray);
        }

        .doctor-experience {
            color: var(--success);
            font-weight: 500;
        }

        .doctor-fee {
            text-align: right;
            font-weight: 600;
            color: var(--primary);
            white-space: nowrap;
        }

        /* Right Side - Map and Details */
        .details-map-container {
            width: 60%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .doctor-details-container {
            background-color: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            flex: 1;
        }

        .doctor-details-header {
            padding: 15px 20px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .doctor-details-header h3 {
            margin: 0;
            font-weight: 600;
        }

        .doctor-details-content {
            padding: 20px;
            overflow-y: auto;
            height: calc(100% - 55px);
        }

        .details-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--gray);
        }

        .details-placeholder i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: #d1d7dc;
        }

        .location-search-container {
            background-color: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 20px;
        }

        .search-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        #locationSearch {
            flex-grow: 1;
        }

        .location-btn {
            padding: 12px 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            transition: var(--transition);
            white-space: nowrap;
        }

        .location-btn:hover {
            background-color: var(--primary-dark);
        }

        .popular-areas {
            margin-top: 15px;
        }

        .popular-areas-title {
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--dark);
        }

        .areas-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .area-chip {
            padding: 8px 15px;
            background-color: var(--light);
            border-radius: 20px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
        }

        .area-chip:hover {
            background-color: var(--primary);
            color: white;
        }

        #map {
            height: 400px;
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        /* Doctor Details View */
        .detail-section {
            margin-bottom: 20px;
        }

        .detail-section h4 {
            color: var(--primary);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .doctor-main-info {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .info-column {
            flex: 1;
            min-width: 250px;
        }

        .info-item {
            margin-bottom: 8px;
            display: flex;
        }

        .info-label {
            font-weight: 600;
            min-width: 120px;
            color: var(--dark);
        }

        .about-doctor {
            background-color: var(--light);
            padding: 15px;
            border-radius: var(--border-radius);
            margin-bottom: 20px;
        }

        .appointment-section {
            margin-top: 25px;
        }

        .date-input {
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            width: 100%;
            font-family: 'Poppins', sans-serif;
            margin-bottom: 15px;
        }

        .time-slots-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .time-slot {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: white;
            cursor: pointer;
            transition: var(--transition);
        }

        .time-slot:hover {
            border-color: var(--primary);
            background-color: #f0f7ff;
        }

        .time-slot.selected {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .time-slot.booked {
            background-color: var(--light-gray);
            color: var(--gray);
            cursor: not-allowed;
        }

        .submit-btn {
            padding: 12px 25px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            transition: var(--transition);
        }

        .submit-btn:hover {
            background-color: var(--primary-dark);
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .responsive-container {
                flex-direction: column;
            }

            .doctors-container, .details-map-container {
                width: 100%;
            }

            .details-map-container {
                height: 600px;
            }
        }

        @media (max-width: 768px) {
            .responsive-container {
                padding: 15px;
                gap: 15px;
            }

            .filters {
                flex-direction: column;
            }

            #experienceFilter {
                width: 100%;
            }

            .search-row {
                flex-direction: column;
            }

            .doctor-card-content {
                flex-direction: column;
                text-align: center;
            }

            .doctor-fee {
                text-align: center;
            }

            .doctor-main-info {
                flex-direction: column;
            }
        }

        /* Loading animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(26, 115, 232, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
  </style>
</head>
<body>

<!-- Main Content -->
<div class="responsive-container">
    <!-- Left Side - Doctors List -->
    <div class="doctors-container">
        <div class="doctors-header">
            <h2><i class="fas fa-user-md"></i> Find a Specialist</h2>
        </div>
        
        <div class="filters-container">
            <div class="filters">
                <select id="specializationFilter">
                    <option value="">All Specializations</option>
                </select>
                <select id="experienceFilter">
                    <option value="">Any Experience</option>
                    <option value="5">5+ years</option>
                    <option value="10">10+ years</option>
                    <option value="15">15+ years</option>
                </select>
            </div>
        </div>

        <!-- Doctors List -->
        <div id="doctorsList" class="doctors-list">
            <!-- Doctors will be loaded here -->
        </div>
    </div>

    <!-- Right Side - Map and Location Details -->
    <div class="details-map-container">
        <!-- Selected Doctor Details -->
        <div class="doctor-details-container">
            <div class="doctor-details-header">
                <h3><i class="fas fa-info-circle"></i> Doctor Information</h3>
            </div>
            <div id="doctorDetails" class="doctor-details-content">
                <div class="details-placeholder">
                    <i class="fas fa-stethoscope"></i>
                    <p>Select a doctor to view details and book an appointment</p>
                </div>
            </div>
        </div>

        <!-- Location Search -->
        <div class="location-search-container">
            <div class="search-row">
                <input type="text" id="locationSearch" placeholder="Search location...">
                <button class="location-btn" onclick="useCurrentLocation()">
                    <i class="fas fa-location-arrow"></i> Current Location
                </button>
            </div>
            <div class="popular-areas">
                <p class="popular-areas-title">Popular Areas:</p>
                <div class="areas-list">
                    <span class="area-chip">Hyderabad</span>
                    <span class="area-chip">Secunderabad</span>
                    <span class="area-chip">Gachibowli</span>
                    <span class="area-chip">Banjara Hills</span>
                </div>
            </div>
        </div>

        <!-- Map Container -->
        <div id="map"></div>
    </div>
</div>

<script>
// Your existing JavaScript code remains exactly the same
let allDoctors = [];
let map;
let markers = [];
let selectedDoctor = null;
let selectedSlot = null;

document.addEventListener('DOMContentLoaded', () => {
  initMap();
  fetchDoctors();
  setupEventListeners();
});

function initMap() {
  const hyderabad = { lat: 17.3850, lng: 78.4867 };
  map = new google.maps.Map(document.getElementById("map"), {
    center: hyderabad,
    zoom: 12,
    styles: [
        {
            "featureType": "administrative",
            "elementType": "labels.text.fill",
            "stylers": [{"color": "#444444"}]
        },
        {
            "featureType": "landscape",
            "elementType": "all",
            "stylers": [{"color": "#f2f2f2"}]
        },
        {
            "featureType": "poi",
            "elementType": "all",
            "stylers": [{"visibility": "off"}]
        },
        {
            "featureType": "road",
            "elementType": "all",
            "stylers": [{"saturation": -100}, {"lightness": 45}]
        },
        {
            "featureType": "road.highway",
            "elementType": "all",
            "stylers": [{"visibility": "simplified"}]
        },
        {
            "featureType": "road.arterial",
            "elementType": "labels.icon",
            "stylers": [{"visibility": "off"}]
        },
        {
            "featureType": "transit",
            "elementType": "all",
            "stylers": [{"visibility": "off"}]
        },
        {
            "featureType": "water",
            "elementType": "all",
            "stylers": [{"color": "#d4e4ec"}, {"visibility": "on"}]
        }
    ]
  });

  const input = document.getElementById("locationSearch");
  const autocomplete = new google.maps.places.Autocomplete(input);
  autocomplete.bindTo("bounds", map);

  autocomplete.addListener("place_changed", () => {
    const place = autocomplete.getPlace();
    if (!place.geometry || !place.geometry.location) return;
    map.setCenter(place.geometry.location);
    map.setZoom(14);
  });
}

// MODIFIED: This function now populates filters and applies the URL search query
async function fetchDoctors() {
  try {
    const url = 'https://www.hitaishihealthcare.com/api/getdoctors';
    console.log("📡 Fetching doctors from:", url);

    const response = await fetch(url);
    if (!response.ok) {
      throw new Error(`HTTP ${response.status} - ${response.statusText}`);
    }

    const data = await response.json();
    console.log("✅ Doctors data received:", data);

    allDoctors = data;

    // ✨ NEW: Populate the specialization filter dropdown dynamically
    populateSpecializationFilter();

    // ✨ NEW: Check for a specialization in the URL and apply it
    const urlParams = new URLSearchParams(window.location.search);
    const specializationFromUrl = urlParams.get('specialization');

    if (specializationFromUrl) {
        // Set the dropdown to the value from the URL
        document.getElementById('specializationFilter').value = specializationFromUrl;
        
        // Trigger the filter function to show the correct doctors
        filterDoctors();
    } else {
        // If no filter in URL, display all doctors as before
        displayDoctors(allDoctors);
        updateMapMarkers(allDoctors);
    }

  } catch (error) {
    console.error("❌ Error fetching doctors:", error);
    document.getElementById('doctorsList').innerHTML =
      `<p style="color: red; padding: 20px; text-align: center;">Failed to load doctors: ${error.message}</p>`;
  }
}

// ✨ NEW: This function populates the specialization dropdown from the doctor list
function populateSpecializationFilter() {
    const specializationFilter = document.getElementById('specializationFilter');
    if (!specializationFilter) return;

    // Get a unique, sorted list of specializations from all doctors
    const specializations = [...new Set(allDoctors.map(doc => doc.specialization))].sort();

    // Clear existing options except the first "All Specializations" one
    specializationFilter.innerHTML = '<option value="">All Specializations</option>';

    specializations.forEach(spec => {
        if(spec) { // Ensure specialization is not null or empty
            const option = document.createElement('option');
            option.value = spec;
            option.textContent = spec;
            specializationFilter.appendChild(option);
        }
    });
}


function displayDoctors(doctors) {
  const doctorsList = document.getElementById('doctorsList');
  doctorsList.innerHTML = '';

  if (doctors.length === 0) {
    doctorsList.innerHTML = `
      <div style="text-align: center; padding: 30px; color: var(--gray);">
        <i class="fas fa-search" style="font-size: 2rem; margin-bottom: 15px;"></i>
        <p>No doctors found matching your criteria</p>
      </div>
    `;
    return;
  }

  doctors.forEach(doctor => {
    const doctorCard = document.createElement('div');
    doctorCard.className = 'doctor-card';
    doctorCard.onclick = () => {
      // Remove active class from all cards
      document.querySelectorAll('.doctor-card').forEach(card => {
        card.classList.remove('active');
      });
      // Add active class to clicked card
      doctorCard.classList.add('active');
      showDoctorDetails(doctor);
    };

    doctorCard.innerHTML = `
      <div class="doctor-card-content">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Doctor" class="doctor-avatar">
        <div class="doctor-info">
          <h3 class="doctor-name">Dr. ${doctor.first_name} ${doctor.last_name}</h3>
          <p class="doctor-specialization">${doctor.specialization}</p>
          <div class="doctor-details">
            <span class="doctor-experience"><i class="fas fa-award"></i> ${doctor.experience} years</span>
            <span><i class="fas fa-hospital"></i> ${doctor.clinic}</span>
          </div>
        </div>
        <div class="doctor-fee">
          ₹${Math.floor(Math.random() * 500) + 500}
        </div>
      </div>
    `;
    doctorsList.appendChild(doctorCard);
  });
}

function showDoctorDetails(doctor) {
  selectedDoctor = doctor;
  const detailsDiv = document.getElementById('doctorDetails');
  const today = new Date().toISOString().split('T')[0];

  detailsDiv.innerHTML = `
    <div>
      <h3 style="color: var(--primary); margin-top: 0; margin-bottom: 15px;">Dr. ${doctor.first_name} ${doctor.last_name}</h3>
      
      <div class="doctor-main-info">
        <div class="info-column">
          <div class="info-item">
            <span class="info-label">Specialization:</span>
            <span>${doctor.specialization}</span>
          </div>
          <div class="info-item">
            <span class="info-label">Experience:</span>
            <span>${doctor.experience} years</span>
          </div>
          <div class="info-item">
            <span class="info-label">Clinic:</span>
            <span>${doctor.clinic}</span>
          </div>
        </div>
        <div class="info-column">
          <div class="info-item">
            <span class="info-label">Availability:</span>
            <span>${doctor.availability}</span>
          </div>
          <div class="info-item">
            <span class="info-label">Timings:</span>
            <span>${doctor.from_time} - ${doctor.to_time}</span>
          </div>
          <div class="info-item">
            <span class="info-label">Contact:</span>
            <span>${doctor.mobile}</span>
          </div>
        </div>
      </div>

      <div class="detail-section">
        <div class="info-item">
          <span class="info-label">Address:</span>
          <span>${doctor.address}</span>
        </div>
      </div>

      <div class="about-doctor">
        <h4>About Doctor</h4>
        <p>Dr. ${doctor.first_name} graduated with a degree in ${doctor.degree} from ${doctor.university} and has ${doctor.experience} years of experience in ${doctor.specialization}.</p>
      </div>

      <div class="appointment-section">
        <h4>Book Appointment</h4>
        <label>Select Appointment Date:</label>
        <input type="date" id="appointmentDate" class="date-input" min="${today}" onchange="loadTimeSlots('${doctor.id}', '${doctor.from_time}', '${doctor.to_time}')">
        
        <div id="timeSlots" class="time-slots-container"></div>
      </div>
    </div>
  `;
}

function loadTimeSlots(doctorId, fromTime, toTime) {
  const date = document.getElementById("appointmentDate").value;
  if (!date) return;

  const slotContainer = document.getElementById("timeSlots");
  slotContainer.innerHTML = "<p>Loading available slots <span class='loading'></span></p>";

  fetch(`https://www.hitaishihealthcare.com/api/getBookedSlots?doctorId=${doctorId}&date=${date}`)
    .then(res => res.json())
    .then(bookedSlots => {
      slotContainer.innerHTML = '';
      selectedSlot = null;

      const start = new Date(`1970-01-01T${fromTime}`);
      const end = new Date(`1970-01-01T${toTime}`);

      if (isNaN(start) || isNaN(end)) {
        slotContainer.innerHTML = `<p style="color: red;">Invalid timing format.</p>`;
        return;
      }

      while (start < end) {
        const slotTime = start.toTimeString().substring(0, 5);
        const isBooked = bookedSlots.includes(slotTime);

        const slotBtn = document.createElement('div');
        slotBtn.className = isBooked ? 'time-slot booked' : 'time-slot';
        slotBtn.textContent = slotTime;

        if (!isBooked) {
          slotBtn.onclick = function() {
            // Remove selected class from all slots
            document.querySelectorAll('.time-slot').forEach(slot => {
              if (!slot.classList.contains('booked')) {
                slot.classList.remove('selected');
              }
            });
            // Add selected class to clicked slot
            this.classList.add('selected');
            selectedSlot = slotTime;
          };
        }

        slotContainer.appendChild(slotBtn);
        start.setMinutes(start.getMinutes() + 30);
      }

      const submitBtn = document.createElement('button');
      submitBtn.className = 'submit-btn';
      submitBtn.textContent = 'Book Appointment';
      submitBtn.onclick = () => submitSlot(doctorId, date);
      slotContainer.appendChild(submitBtn);
    })
    .catch(err => {
      console.error("Slot load error:", err);
      slotContainer.innerHTML = `<p style="color:red;">Unable to load time slots. Please try again.</p>`;
    });
}

function submitSlot(doctorId, date) {
  if (!selectedSlot) return alert("Please select a time slot");

  fetch('https://www.hitaishihealthcare.com/api/bookSlot', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      doctorId,
      doctorUid: selectedDoctor.uid,
      slot: selectedSlot,
      date
    })
  })
    .then(res => res.json())
    .then(data => {
      alert('Appointment booked successfully at ' + selectedSlot);
      document.getElementById('timeSlots').innerHTML = '<p style="color: var(--success);">Appointment booked successfully!</p>';
    })
    .catch(err => {
      console.error(err);
      alert('Booking failed. Please try again.');
    });
}

function updateMapMarkers(doctors) {
  markers.forEach(marker => marker.setMap(null));
  markers = [];

  doctors.forEach(doctor => {
    if (doctor.address) {
      const geocoder = new google.maps.Geocoder();
      geocoder.geocode({ address: doctor.address }, (results, status) => {
        if (status === "OK" && results[0]) {
          const marker = new google.maps.Marker({
            map: map,
            position: results[0].geometry.location,
            title: `${doctor.first_name} ${doctor.last_name} - ${doctor.clinic}`,
            icon: {
              url: "https://maps.google.com/mapfiles/ms/icons/blue-dot.png"
            }
          });
          markers.push(marker);
          marker.addListener('click', () => {
            // Highlight the corresponding doctor card
            document.querySelectorAll('.doctor-card').forEach(card => {
              card.classList.remove('active');
            });
            showDoctorDetails(doctor);
          });
        }
      });
    }
  });
}

function setupEventListeners() {
  document.getElementById('specializationFilter').addEventListener('change', filterDoctors);
  document.getElementById('experienceFilter').addEventListener('change', filterDoctors);

  document.querySelectorAll('.area-chip').forEach(chip => {
    chip.addEventListener('click', function () {
      const area = this.textContent;
      document.getElementById('locationSearch').value = area;

      const geocoder = new google.maps.Geocoder();
      geocoder.geocode({ address: area + ', Hyderabad' }, (results, status) => {
        if (status === "OK" && results[0]) {
          map.setCenter(results[0].geometry.location);
          map.setZoom(14);
        }
      });
    });
  });
}

function filterDoctors() {
  const specialization = document.getElementById('specializationFilter').value;
  const experience = document.getElementById('experienceFilter').value;

  let filtered = allDoctors;

  if (specialization) {
    filtered = filtered.filter(doc => doc.specialization === specialization);
  }
  if (experience) {
    filtered = filtered.filter(doc => parseInt(doc.experience) >= parseInt(experience));
  }

  displayDoctors(filtered);
  updateMapMarkers(filtered);
}

function useCurrentLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => {
        const location = {
          lat: pos.coords.latitude,
          lng: pos.coords.longitude
        };
        map.setCenter(location);
        map.setZoom(14);

        const geocoder = new google.maps.Geocoder();
        geocoder.geocode({ location }, (results, status) => {
          if (status === "OK" && results[0]) {
            document.getElementById('locationSearch').value = results[0].formatted_address;
          }
        });
      },
      () => alert("Unable to retrieve your location. Please check your location settings.")
    );
  } else {
    alert("Geolocation is not supported by your browser.");
  }
}
