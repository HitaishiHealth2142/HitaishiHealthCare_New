<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Profile | Hitaishi Healthcare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #667eea, #764ba2, #89f7fe, #66a6ff);
      background-size: 400% 400%;
      animation: gradientMove 15s ease infinite;
      color: #333;
    }

    @keyframes gradientMove {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .container {
      max-width: 800px;
      margin: 50px auto;
      background: rgba(255, 255, 255, 0.9);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #0056b3;
    }

    .profile-item {
      margin-bottom: 18px;
    }

    .profile-item label {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
      color: #444;
    }

    .profile-item span {
      display: block;
      font-size: 16px;
    }

    .logout-btn {
      display: block;
      margin: 30px auto 0;
      padding: 12px 25px;
      font-size: 16px;
      background: #dc3545;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .logout-btn:hover {
      background: #c82333;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Doctor Profile</h2>
    <div id="profileDetails">
      <p>Loading profile...</p>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

    <script>
    async function loadDoctorProfile() {
        const profileDiv = document.getElementById("profileDetails");
        const doctorUser = localStorage.getItem("doctorUser");

        let user;
        try {
        user = JSON.parse(doctorUser);
        if (!user || !user.uid) throw new Error("UID missing");
        } catch (e) {
        profileDiv.innerHTML = "<p style='color:red;'>Invalid login. Redirecting...</p>";
        setTimeout(() => window.location.href = "doctorlogin.html", 1500);
        return;
        }

        try {
        const uid = user.uid;
        const res = await fetch(`https://hitaishihealthcare.com/api/gdoctors/${uid}`);
        if (!res.ok) throw new Error("Profile fetch failed");

        const doctor = await res.json();

        profileDiv.innerHTML = `
            ${buildProfileItem("Full Name", doctor.first_name + " " + doctor.last_name)}
            ${buildProfileItem("Email", doctor.email)}
            ${buildProfileItem("Mobile", doctor.mobile)}
            ${buildProfileItem("Address", doctor.address)}
            ${buildProfileItem("Degree", doctor.degree)}
            ${buildProfileItem("University", doctor.university)}
            ${buildProfileItem("Experience", doctor.experience + " years")}
            ${buildProfileItem("Aadhar Card", doctor.aadhar_card)}
            ${buildProfileItem("License Number", doctor.license_number)}
            ${buildProfileItem("Specialization", doctor.specialization)}
            ${buildProfileItem("Clinic", doctor.clinic)}
            ${buildProfileItem("Availability", doctor.availability)}
            ${buildProfileItem("Timing", doctor.from_time + " - " + doctor.to_time)}
            ${buildProfileItem("Additional Info", doctor.additional_info || "N/A")}
        `;
        } catch (err) {
        console.error(err);
        profileDiv.innerHTML = `<p style='color:red;'>Failed to load profile.</p>`;
        }
    }

    function buildProfileItem(label, value) {
        return `
        <div class="profile-item">
            <label>${label}</label>
            <span>${value}</span>
        </div>
        `;
    }

    function logout() {
        localStorage.removeItem("doctorUser");
        localStorage.removeItem("doctorToken");
        fetch("https://hitaishihealthcare.com/api/doctorlogout", { method: "POST" }).finally(() => {
        window.location.href = "doctorlogin.html";
        });
    }

    window.onload = loadDoctorProfile;
    </script>

</body>
</html>
