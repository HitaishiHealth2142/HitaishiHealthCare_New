<!-- Search a Test -->
<div style="width: 80%; max-width: 1200px; margin: auto; font-family: Arial, sans-serif;">
  <!-- Search Bar -->
  <div style="background-color: #fff; padding: 15px 15px 30px;">
    <div id="search-bar-container" style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px; padding: 15px; background: #f0f0f0; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
      
      <!-- Title -->
      <div style="font-size: 22px; font-weight: bold; color: #2e3192;">Search a Test</div>

      <!-- Search -->
      <input type="text" id="search-box" placeholder="Search for test and health checkup"
        style="border: 2px solid #17b8c2; padding: 12px; width: 350px; max-width: 100%; font-size: 16px; color: #333; border-radius: 6px; outline: none;"
        onfocus="this.style.borderColor='#0fa3af';" onblur="this.style.borderColor='#17b8c2';">

      <!-- Dropdown -->
      <select id="sort-by" style="background: #f9f9f9; padding: 12px; border-radius: 6px; border: 2px solid #ddd; cursor: pointer; font-size: 16px;">
        <option value="popular">Sort by: Popular ▼</option>
        <option value="price-low-to-high">Sort by: Price (Low to High)</option>
        <option value="price-high-to-low">Sort by: Price (High to Low)</option>
        <option value="ratings">Sort by: Ratings</option>
      </select>
    </div>
  </div>

  <!-- Test Grid -->
  <div id="test-prices-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 10px 15px;">
    <!-- Test items will be rendered here by JavaScript -->
  </div>

  <!-- Modal Overlay -->
  <div id="booking-modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
    <div id="booking-modal" style="position: relative; background: #fff; width: 400px; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); max-height: 90vh; overflow-y: auto;">
      <h2 style="text-align: center; color: #00A6A6;">Book Test</h2>

      <form id="booking-form" onsubmit="submitForm(event)" style="padding: 10px;">
        <label for="test-name" style="font-weight: bold; display: block; margin-top: 10px;">Test Name:</label>
        <input type="text" id="test-name" readonly style="width: 100%; padding: 10px; margin: 5px 0 15px; border-radius: 5px; border: 1px solid #ccc;">

        <label for="name" style="font-weight: bold; display: block;">Your Name:</label>
        <input type="text" id="name" required style="width: 100%; padding: 10px; margin: 5px 0 15px; border-radius: 5px; border: 1px solid #ccc;">

        <label for="phone" style="font-weight: bold; display: block;">Phone Number:</label>
        <input type="text" id="phone" required style="width: 100%; padding: 10px; margin: 5px 0 15px; border-radius: 5px; border: 1px solid #ccc;">

        <label for="email" style="font-weight: bold; display: block;">E-Mail Address:</label>
        <input type="email" id="email" required style="width: 100%; padding: 10px; margin: 5px 0 15px; border-radius: 5px; border: 1px solid #ccc;">

        <!-- Address -->
        <label style="font-weight: bold; display: block;">Floor:</label>
        <input type="text" id="floor" style="width: 100%; padding: 10px; margin: 5px 0 15px; border-radius: 5px; border: 1px solid #ccc;">

        <label style="font-weight: bold; display: block;">House Number:</label>
        <input type="text" id="house-number" style="width: 100%; padding: 10px; margin: 5px 0 15px; border-radius: 5px; border: 1px solid #ccc;">

        <label style="font-weight: bold; display: block;">Area:</label>
        <input type="text" id="area" style="width: 100%; padding: 10px; margin: 5px 0 15px; border-radius: 5px; border: 1px solid #ccc;">

        <label style="font-weight: bold; display: block;">Mandal:</label>
        <input type="text" id="mandal" style="width: 100%; padding: 10px; margin: 5px 0 15px; border-radius: 5px; border: 1px solid #ccc;">

        <label style="font-weight: bold; display: block;">District:</label>
        <input type="text" id="district" style="width: 100%; padding: 10px; margin: 5px 0 15px; border-radius: 5px; border: 1px solid #ccc;">

        <label style="font-weight: bold; display: block;">Pincode:</label>
        <input type="text" id="pincode" style="width: 100%; padding: 10px; margin: 5px 0 15px; border-radius: 5px; border: 1px solid #ccc;">

        <!-- Buttons -->
        <div style="text-align: center; margin-top: 20px;">
          <button type="submit" style="background: #28a745; color: #fff; padding: 12px 25px; border-radius: 5px; border: none; cursor: pointer; font-size: 16px; font-weight: bold;">Confirm Booking</button>
          <button type="button" onclick="closeModal()" style="background: #dc3545; color: #fff; padding: 12px 25px; border-radius: 5px; border: none; cursor: pointer; margin-left: 10px; font-size: 16px; font-weight: bold;">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</div>

<style>

<script>
  // Function to open the booking form with the selected test name
  function openBookingForm(testName) {
      document.getElementById("test-name").value = testName;
      document.getElementById("booking-modal-overlay").style.display = "flex";
      document.body.style.overflow = "hidden"; // Prevent scrolling when modal is open
  }

  // Function to close the modal
  function closeModal() {
      document.getElementById("booking-form").reset();
      document.getElementById("booking-modal-overlay").style.display = "none";
      document.body.style.overflow = "auto"; // Re-enable scrolling
  }

  // Sample data for tests with categories
  const tests = [
      { name: "FASTING PLASMA GLUCOSE", price: 120, rating: 4.5, category: "Diabetes" },
      { name: "COMPLETE BLOOD PICTURE (CBP)", price: 390, rating: 4.2, category: "General" },
      { name: "CREATININE", price: 260, rating: 4.0, category: "Kidney" },
      { name: "POST LUNCH GLUCOSE", price: 120, rating: 3.8, category: "Diabetes" },
      { name: "GLYCATED HEMOGLOBIN (HbA1c)", price: 580, rating: 4.7, category: "Diabetes" },
      { name: "THYROID PROFILE", price: 650, rating: 4.6, category: "Thyroid" },
      { name: "LIPID PROFILE", price: 750, rating: 4.4, category: "Heart" },
      { name: "COMPLETE URINE EXAMINATION (CUE)", price: 150, rating: 3.9, category: "Kidney" },
      { name: "LIVER FUNCTION TEST (LFT-A)", price: 450, rating: 4.1, category: "Liver" },
      { name: "ELECTROCARDIOGRAM (ECG)", price: 250, rating: 4.3, category: "Heart" },
      { name: "THYROID STIMULATING HORMONE (TSH)- Ultrasensitive", price: 250, rating: 4.0, category: "Thyroid" },
      { name: "ERYTHROCYTE SEDIMENTATION RATE (ESR)", price: 290, rating: 3.7, category: "General" },
      { name: "UREA", price: 150, rating: 3.5, category: "Kidney" },
      { name: "X-CHEST PA VIEW", price: 250, rating: 4.2, category: "Lungs" },
      { name: "URIC ACID", price: 180, rating: 3.8, category: "Kidney" },
      { name: "ULTRASOUND-ABDOMEN AND PELVIS", price: 1200, rating: 4.8, category: "Liver" },
      { name: "RANDOM PLASMA GLUCOSE", price: 120, rating: 3.9, category: "Diabetes" },
      { name: "C-REACTIVE PROTEIN (CRP)", price: 250, rating: 4.1, category: "General" },
      { name: "VITAMIN B12", price: 250, rating: 4.0, category: "Vitamins" },
      { name: "ELECTROLYTES", price: 250, rating: 3.6, category: "General" },
      { name: "CALCIUM", price: 250, rating: 3.7, category: "Bone" },
      { name: "PREGNANCY TEST (URINE)", price: 200, rating: 4.0, category: "Pregnancy" },
      { name: "BETA HCG (QUANTITATIVE)", price: 400, rating: 4.2, category: "Pregnancy" },
      { name: "PROSTATE SPECIFIC ANTIGEN (PSA)", price: 600, rating: 4.1, category: "Prostate" },
      { name: "SEMEN ANALYSIS", price: 500, rating: 4.0, category: "Fertility" },
      { name: "MAMMOGRAPHY", price: 1500, rating: 4.5, category: "Breast" },
      { name: "TUBERCULOSIS TEST (TB GOLD)", price: 1200, rating: 4.3, category: "Tuberculosis" },
      { name: "COMPLETE HEMOGRAM", price: 300, rating: 4.1, category: "Anemia" },
      { name: "ALLERGY PANEL TEST", price: 2500, rating: 4.4, category: "Allergy" },
      { name: "FEBRILE ANTIBODY TEST", price: 350, rating: 3.9, category: "Fever" }
  ];

  // Function to filter tests by category
  function filterTests(category) {
      const filteredTests = tests.filter(test => test.category === category);
      renderTests(filteredTests);
      document.getElementById("search-box").value = ""; // Clear search box
      document.getElementById("sort-by").value = "popular"; // Reset sort
      
      // Scroll to test grid section
      document.getElementById("test-prices-grid").scrollIntoView({ behavior: 'smooth' });
  }

  // Function to render test items
  function renderTests(testList) {
      const grid = document.getElementById("test-prices-grid");
      grid.innerHTML = ""; // Clear the grid

      if (testList.length === 0) {
          grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 20px; color: #666;">No tests found matching your criteria.</div>';
          return;
      }

      testList.forEach(test => {
          const item = document.createElement("div");
          item.className = "test-price-item";
          item.innerHTML = `
              <div>${test.name}</div>
              <div class="price">₹ ${test.price}</div>
              <a href="#" onclick="event.preventDefault(); openBookingForm('${test.name}')">
                  BOOK <img src="https://cdn-icons-png.flaticon.com/512/126/126510.png" alt="cart" width="14" height="14">
              </a>
          `;
          grid.appendChild(item);
      });
  }

  // Search functionality
  const searchBox = document.getElementById("search-box");
  searchBox.addEventListener("input", () => {
      const searchTerm = searchBox.value.toLowerCase();
      const filteredTests = tests.filter(test => 
          test.name.toLowerCase().includes(searchTerm)
      );
      renderTests(filteredTests);
  });

  // Sort functionality
  const sortBy = document.getElementById("sort-by");
  sortBy.addEventListener("change", () => {
      const sortValue = sortBy.value;
      let sortedTests = [...tests]; // Create a copy of the original array

      switch (sortValue) {
          case "price-low-to-high":
              sortedTests.sort((a, b) => a.price - b.price);
              break;
          case "price-high-to-low":
              sortedTests.sort((a, b) => b.price - a.price);
              break;
          case "ratings":
              sortedTests.sort((a, b) => b.rating - a.rating);
              break;
          case "popular":
          default:
              // Default sorting (by popularity or original order)
              break;
      }

      renderTests(sortedTests);
  });

  function submitForm(event) {
      event.preventDefault(); // Prevent default form submission

      let name = document.getElementById('name').value.trim();
      let phone = document.getElementById('phone').value.trim();
      let email = document.getElementById('email').value.trim();

      // Validate required fields
      if (name === '' || phone === '' || email === '') {
          alert('Please fill in all required fields (Name, Phone, Email).');
          return;
      }

      const formData = {
          testName: document.getElementById('test-name').value,
          name: name,
          phone: phone,
          email: email,
          floor: document.getElementById('floor').value.trim(),
          houseNumber: document.getElementById('house-number').value.trim(),
          area: document.getElementById('area').value.trim(),
          mandal: document.getElementById('mandal').value.trim(),
          district: document.getElementById('district').value.trim(),
          pincode: document.getElementById('pincode').value.trim()
      };

      console.log('Form Data:', formData);

      alert('Booking confirmed! We will contact you shortly.');
      document.getElementById("booking-form").reset();
      closeModal();
  }

  // Initial render - show all tests
  renderTests(tests);
</script>

<!-- Placeholder where chatbot will be inserted -->
<div id="chatbot-placeholder"></div>

<!-- JS to load the chatbot -->
<script>
    fetch('chatbot.html')
      .then(res => res.text())
      .then(html => {
        const container = document.getElementById('chatbot-placeholder');
        container.innerHTML = html;

        // ⛔ At this point, any <script> tags inside chatbot.html are just inserted as text.
        // ✅ So, we must find and re-run those <script> blocks manually:
        const scripts = container.querySelectorAll("script");
        scripts.forEach(script => {
          const newScript = document.createElement("script");
          if (script.src) {
            newScript.src = script.src;
          } else {
            newScript.textContent = script.textContent;
          }
          document.body.appendChild(newScript);
        });
      });
</script>
